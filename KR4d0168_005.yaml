body:
  text: 栟櫚集卷五宋鄧肅撰古風賀梁溪李先生除右府伏承大觀文丞相先生親承聖恩擢置右府縉紳交慶正豪傑林立謀猷川行之時也肅不敢效世俗諂語致賀直述京城圍閉君父䝉塵之狀以見不共戴天之仇在所必報也伏乞鈞慈特賜采攬門人左正言鄧肅謹百拜上北兵振地喧鼙鼓黑幟插城遍樓櫓蔽空戈甲來如雲羣盜相隨劇豺虎征塵漠漠四壁昏諸將變名竄軍伍十萬兵噪龍德宫上皇避難幾無所嗣君匹馬詣行營朕躬有罪非君父奸臣草表遽書降身率百官先拜舞那知馮道冷笑渠立晉猶存中國主翠華竟作沙漠行望雲頓有關河阻九天空殿欎岧嶤目斷離離變禾黍生靈日夕望中興猶幸君王自神武相公特起為蒼生下視蕭曹無足數詞議雲湧紛盈廷羣策但以二三取老謀大節數子并行見翠華歸九五立馬常依仗下鳴日詠杜鵑懷杜甫飛鳥猶尊古帝魂激烈浩歌來義旅規模共佐李西平廟貌不移舊鐘簴上先生疲馬踏殘月荷策來泮宫入門見先生先生何雍容循循言語能下誘青蒿因得附長松短檠挑燈一千二百夜髙談雄辨磊落沃胸中吾皇求士苦匆匆不許先生久卧龍玉鞭斜指長安道祇緣此去何由從嗚唏吁小軒從此冷如水虀鹽朝暮欣欣爾空留絳帳照孤燈窗外西風起寒葦龍興避難傍山怪石如蹲虎絶頂去天無尺五却披叢棘下山腰丹碧照空飛棟宇道人養道厭塵勞避世只嫌山不髙那知行空老曼倩竊食不遺王母桃松檜參天門晝閉碧玉擷蔬飯炊雪百年冷坐無車音一旦偕來真惡客當知喧寂無殊觀出世何妨在世間能致吾人師作古龍興今日始開山和明逺喜雨作絳狗鳴空朱虎攫神焦鬼爛不堪虐自嗟筆力無韓豪不敢讒風干鼎鑊聞說祥符物外臣能將念力蘇罷民挽出洞天肩未息飛雲驅雨已生春曹侯德我詩如洗無乃采葑遺下體當知此雨非人功政賴曹溪浩無底君看連天六日隂簷聲夜和蓬窗吟羲和知師今日去自行天上約秋霖寄亨甫晴空當晝棲暘蟲目林欲焚深甑中多謝吾君肯相訪袖中詩句來清風愛主我堪犬馬比采蕨山巔行饑死豈能五絶比天人疾讀君詩汗如洗君今師友人中豪琢磨事業當日髙若扣天門自求試速為奉天留陸贄東林一枝庵世間傑棟俯飛翰簾旌不動天風寒但得一身自安逸誰思寒士三萬間東林天下推第一净几明窗萬禪客主人幽棲僅一枝便覺寬容無迫窄一身六尺何足患蠢動當知俱欲安誰識曹溪一滴許能令法雨遍塵寰醉吟軒淵明句法古無有頭上幅巾供漉酒李白豪篇驚倒人舉目望天不計斗二子風流不可追公作幽軒為喚回長鯨渴興沉江海錦囊妙句生風雷安得一㕓在公側時時去作孔融客愁腸得酒生和風也向毫端寫春色嘲蛇傷足清官只得林泉幽也有曲膂潜相仇肆毒不知分彼此後身那解癖春秋我嬰逆鱗龍不怒誰知蠢蠢敢當路要我迷陽不作難祇恐夀光劾君去送丹霞山壓濃隂勢欲頽阿香推車振不開君來論詩風四起挽出羲和照九垓别君八年驚電掃霜髭已失童顔好逝者姑從造物流吾人一笑初不老明朝飛錫過平津浩歌歸耕隴上雲岩竇不應藏一滴要須化作無邉春玩芳亭蔓草芊芊迷舊圃日號狐狸走鼯鼠世欲去之嗟未能竭力米鹽汗如雨先生人間第一流目中萬事無全牛割雞已覺無多子斬新亭柳作清逰紛紛姚魏爭黃紫醉眼雖觀心似水但搜佳景付吟魂吐作新詩爛盈紙慙愧知音太史公為榜佳名字畫雄二公連茹歸霄漢此亭萬古揚清風小飲斷臂一朝續狼肉裕矢漫空夜相逐海鳬亂飛三丈毛藍田不行四寸玉何如南嶽追祖風雲間生致桃李穠笑盡酒船三百斛醉吹簫管上晴空質夫和來我生不顧四壁空千金買笑醉春風半夜酒紅朝玉頰亭亭秋水影芙蓉作文忽慕元和格遂入賢關親眉白遽聞皇甫語穿天淵源蓋是退之客琢句出人數等髙要令天下無英豪擊節一觀百憂失不覺此身猶布袍平生自足牛蹄水為公辟易數百里願得佳句時飛來此間幸有子期耳雨意朝來猶許重安得相從恣嘲弄虀鹽充腹燈一螢兀坐亡聊真夢夢㑹鞭匹馬城東陬對床臭味兩相投歸來筆下飽竒怪不須更事子長逰紫芝和來雨餘榴火欲燒空宫槐老翠暗薰風即今此景那可恃忽觀玉露泣芙蓉請公文急出新格一變茅黃兼葦白坐令鼠輩掃地空毋使再來相主客異日光芒李杜髙聲價豈但一時豪故應髙視空四海紛紛過眼萬銀袍我生作意逰弱水蓬萊杳隔三萬里何如平地揖詩仙一洗從來鄭衛耳期公便作九鼎重雲水未容扁舟弄漫天霖雨在胸襟半夜吹作髙宗夢鬼方月窟雖殊陬頽治之心輒相投澤民事業無多子要使人人鼓腹逰邂逅宇文閩山去天餘尺五漁浦撼舟驚九死臨水登山萬里來却向春圍飲墨水白雲目斷無飛翰夜將劍鋏於誰彈世人相馬例嫌瘦飢死首陽不作難側聞天下有人傑洗出新詩耿氷雪年來亦復坐文窮空使品流居第一摳衣浩歌起相從雨意却憂潑墨濃匆匆對語一笑粲萬斛窮愁一洗空公今清譽髙星斗我乃棲遲事奔走收拾正賴退之豪瘦寒不復麾島郊别施君叔异泮水儒生急寸祿白袍千人如立鵠爭注蟲魚股置錐世外語言不到目我嫌人醉還啜醨常嗟心迹兩相離邂逅得君能我意筆端聊復出新竒愛君未冠少年郎語出輒驚鵷鷺行若不紛華替初志事業他日未易量今披青衫走塵土滿面春風歸仕路拄笏政可望西山莫見輶軒腰傴僂我今縶維猶未釋相思何處訪縱跡為君時望斗牛間期君光芒髙萬尺雨花軒君不見解空晏坐寂無侣寶花忽爾窺岩户已將精進聳人天是用色相旌其苦又不見毗耶居士坐髙堂四落天花趂揮麈若人猶有空可談真機何處遁天女豐岩寂寂梵王家誰把幽岩名雨花我知此誠齊人耳但識解空與毗耶誰知豐岩了無取口角瀾翻初不語吾宗未出天莫窺豈復有花可為雨訪丹霞煙雲著天無寸空寒窗瑟瑟夜號風浩歌出門何所詣故人飛錫梵王宫扣門兀坐寂無語衲破蒙頭靣如土逢場聊復觸機鋒千偈瀾翻疾風雨我生鼻孔自撩天笑將龍肉比談禪針芥相投得吾子帖肉汗衫今脫然但憐淨業猶詩酒醉筆時作蛟龍走儻惟語默兩無妨慿公刻燭聨千首况是雪意政相留慎勿匆匆撫刀頭明日談笑作春色同在瓊瑶十二樓戲吳少綝短檠對君同泮水虀鹽不給窮吞紙君今載紙連數艘貧冨相懸九萬里崇寧政事先方田紛紛訟牒亂雲烟祗今列屋飽蟲蠧官折羊酒夀髙年夫子談笑收餘慶不復塵埃生釡甑便當痛飲天津橋一網盡呼天下俊寄興國福聖二老我本窮山采薇蕨偶上用闕日月雲端不肯舞仙人天公雖笑雷公斥闕細肋詹成炊飯似摶沙牛革偏甘真嚼鐵慙愧忘形二禪客倒屣相迎作禪悅竹萌瀹水瑩瓊瑶土芝借糟凝琥珀余不供僧僧供余是事顛倒古所無要知人我兩無有此飽便當均太虛昨日龍興飛尺書俯我登山有籃輿試問二師肯俱否一飽還君欲借渠送遊教授世事齪齪飢寒語思怨嘈然相爾汝蠅營狗茍端可憐不見秋風黃鵠舉君看三山夜降神鍾成人傑超不羣堂堂徑氣薄霄漢藐視四海豈無人簞瓢陋巷誰知已自足一樽釣秋水惟使文星射紫微天書遂敕川龍起笑來南國開絳帳議論清明森萬象已令爐錘無頑金九萬却摶羊角上飄飄歸興凌秋空莫恨丁寬易已東天生若人不私子當令四海遍春風廬山平生作意廬山逰往來却貪吳越舟陛下許臣鞭匹馬芒鞋因得欵清幽是時六月蒸炎暑六合黃塵空一雨上方冷翠襲衣襟便覺笑談在天宇栟櫚集卷五
