body:
  text: 栟櫚集卷二十四宋鄧肅撰志銘何長善承事墓志銘君諱抗字彥高晉永嘉中有八姓入閩者何其一也君實其裔故世為邵武桃溪人曾父諱福大父諱景皇考諱紹謨皆隱德不仕自大父以下皆博通經史尤深左氏春秋然止用以行巳耳未嘗為進取計君繼其業家益貧遂習進士舉自元豐厯紹聖經義詞賦蓋嘗再變君各臻其妙摳衣膝行願為門弟子者蓋不特為閩中士人耳自江以西往往皆來凡辱君奬提者類登危科作膴仕曳青紫拜絳帷以謝恩德者歲不乏人故君雖栖遲蹭蹬未有所遇然聲譽益砰轟衆皆意君旦夕為雲霄人矣㑹崇寧間行舍法月考歲計銖積寸纍必歷數寒暑然後得以射䇿王庭君曰嘻吾二親垂白家無擔石豈可輟吾溫清不可闕之恩以易區區無用之虛名乎故安居陋巷以教四方學者鶉衣蔬茹泰然自處力事二親孝行靄聞晚年尤喜佛書於生死之變蓋了了然宣和七年冬得疾踰月未嘗伏枕但揮肉食耳十一月三日晨興正冠西首奄然而逝得歲六十有七娶馮氏男二人曰元曰方皆應進士舉方嘗遊邊得承信郎今陷燕以不能歸孫三人曰鐔曰鑄曰鐸元才學卓然於某為友舊以君門下士通直郎謝尋狀君之行不逺數百里過余曰先君子老死場屋不有碣銘將泯沒矣願夫子志之余曰嘻君終身不遇豈才之罪乎君少年未聞道嘗侍母疾至於刲股此在君為不足書然孝誠所迫非以聲音笑貌為也嘗同仲兄遊學江西兄不幸即負其骨以歸時方炎蒸瘴瘧日甚死於道路者往往相枕或戒君以徐行君曰吁死生不足顧也吾知負吾兄以慰倚門之望耳考其所履如此其可謂之孝子矣古人求忠臣必於孝子之門若使君得志在朝廷上決不顧妻孥服食之私賣國以自媒其所立當有絶人者君今不忍捨其親以居學校遂使天下失此忠臣蓋崇寧創法者沮之耳此余所以傷一時政事之失而不傷君之不偶也請銘之銘曰胸中萬卷筆下雲煙百不一死歸此九泉子孫繩繩既藝且賢其後必大吾卜之天栟櫚集卷二十四
