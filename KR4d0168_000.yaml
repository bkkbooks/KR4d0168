body:
  text: 栟櫚集别集類三宋提要臣等謹案栟櫚集十六巻宋鄧肅撰按王明清揮麈後録稱宣和壬寅艮岳成徽宗御製記李質曹組各獻賦獨太學生鄧肅上十詩備述花石之事其末句云但願君王安萬姓圃中何日不春風詔屏逐之靖康初李伯紀啟其事薦其才召對賜進士出身後為右正言著亮直之名於當日肅字志宏南劍人有文集號栟欄遺文三十巻詩附集中云云即其人也今本僅詩一巻詞一巻文十四巻與三十巻之数不符殆散佚不完又經金人重編歟當張邦昌之僭立也肅間行奔赴南京其擢右正言即在是時大節與杜甫畧相似其靖康迎駕行後迎駕行等篇亦頗近甫奉先諸作南北宋間可謂篤勵名節之士又唐宋以來學者皆尊揚雄熈寕中遂至配享而肅書揚雄事獨指為叛臣無可容於天地之間與沈與求疏論王安石過尊揚雄未知孰為先後然均在朱子綱目書莾大夫之前考陸深溪山餘話載肅與朱子父松相善有醉留冠帶以質紙筆之戲肅有寄朱韋齋詩即道其事然則綱目之斥揚雄得無傳肅之説乎其識如是宜其立身有本末矣乾隆四十四年三月㳟校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四栟櫚集目録别集類三宋巻一詩一巻二詩二巻三詩三巻四詩四巻五詩五巻六詩六巻七詩七巻八詩八巻九詩九巻十詩十巻十一樂府巻十二奏劄巻十三文巻十四書巻十五序巻十六記一巻十七記二巻十八記三巻十九題跋上巻二十題跋下巻二十一啟簡巻二十二祭文巻二十三疏語巻二十四誌銘巻二十五評論
