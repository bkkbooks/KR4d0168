body:
  text: 栟櫚集别集類三宋提要臣等謹案栟櫚集十六卷宋鄧肅撰按王明清揮麈後録稱宣和壬寅艮嶽成徽宗御製記李質曹組各獻賦獨太學生鄧肅上十詩備述花石之事其末句云但願君王安萬姓圃中何日不春風詔屏逐之靖康初李伯紀啓其事薦其才召對賜進士出身後為右正言著亮直之名於當日肅字志宏南劍人有文集號栟欄遺文三十卷詩附集中云云即其人也今本僅詩一卷詞一卷文十四卷與三十卷之數不符殆散佚不完又經金人重編歟當張邦昌之僭立也肅間行奔赴南京其擢右正言即在是時大節與杜甫略相似其靖康迎駕行後迎駕行等篇亦頗近甫奉先諸作南北宋間可謂篤勵名節之士又唐宋以來學者皆尊揚雄熙寧中遂至配享而肅書揚雄事獨指為叛臣無可容於天地之間與沈與求疏論王安石過尊揚雄未知孰為先後然均在朱子綱目書莾大夫之前考陸深溪山餘話載肅與朱子父松相善有醉留冠帶以質紙筆之戲肅有寄朱韋齋詩即道其事然則綱目之斥揚雄得無傳肅之説乎其識如是宜其立身有本末矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四栟櫚集目録别集類三宋卷一詩一卷二詩二卷三詩三卷四詩四卷五詩五卷六詩六卷七詩七卷八詩八卷九詩九卷十詩十卷十一樂府卷十二奏劄卷十三文卷十四書卷十五序卷十六記一卷十七記二卷十八記三卷十九題跋上卷二十題跋下卷二十一啓簡卷二十二祭文卷二十三疏語卷二十四志銘卷二十五評論
