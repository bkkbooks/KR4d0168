body:
  text: 栟櫚集卷十四宋鄧肅撰書上龜山先生楊博士鄉姪鄧某謹裁書上提宫博士先生閣下嗟乎世人學者急於爵祿之奉綴緝腐語以追時好凡不可以取青紫者無復給視窮年兀兀老死章句識者悲之至於卓犖瓌竒之士未始數數於此者則必箕踞高吟遊心景物收拾天地精英以實錦囊直鄙時輩為嘈嘈蠅蚋若不可與之言者殆不知畫餅象龍均於無用又烏可以五十步笑百步哉幸而有知讀聖人之書而求其所以言者不得於經則必求於世儒之説即世儒之説而求之其親見異聞往往出人意表恍惚變化不可捕捉凡所言者皆人之所不可言凡所行者皆人之所不可行悉心竭力莫知所歸則又將去而之佛老矣嗚呼道之不明真學者之不幸也某於衆人不幸之中若天與之幸者得遊於令壻知默之門雖駑鈍之質不能窺測其涯涘然竊嘗聞之知默之言得於先生先生之學非有瓌偉俶詭之論喬詰卓驇之節以聳世俗之觀聽獨於行止疾徐而知堯舜之道於不為巳甚而得孔子之心其所言者人皆可言也其所行者人皆可行也某之心於是知所嚮某之力於是知可以勉矣蓋亦嘗因其可言者以思其所未能言因其所可行者以思其所未能行時見先生卓然不可企及嚮風之行願識之志往往參前倚衡如或見之今先生去而家於毗陵徘徊鄉郡某適在此幸可以瞻拜屨舄此某所以輒布區區之誠仰干將命初不知其才之可進與否也昔儀封人將見孔子曰君子之至於斯也吾未嘗不得見也古之人其樂見君子也如此然儀封人之賢否雖不可知而其姓字且不見論語則亦必其無大過人者某雖不肖不足以望君子之塵至其樂見君子之心於儀封人若無甚愧不識先生肯與之一見否干冒威嚴惶懼之至上劉延康某月某日南劒州上舍貢士鄧某謹齋戒沐浴裁書束拜寓獻判府經略大學相府先生鈞席某嘗讀顔真卿杲卿及張巡許逺四公列傳見其為唐社稷奮身不顧守節死義名高日月未嘗不拊髀而嘆曰嘻天地英傑之氣勃鬱未吐不知幾千百年乃鍾若人以為萬世標凖是其可多得哉故天下之人有脅肩諂笑能容悅者亦不敢借此數公以諛今之君子雖好大喜功不計能否欲近配古人者聞此數公亦必悚然起惕然懼歉然而不敢當也嗚呼是果不敢當乎抑有待而後傳乎天地英傑之氣亦安知其不再吐耶今年睦歙冦嘯山谷奮臂疾呼而羣小附之攻城圍邑江浙騷然官吏狼顧喪魂沮魄棄城而遁者不可勝數會稽大府又賊所必爭之地奔命來冦動以千計中外聞之莫不為之股栗也而判府大學報國赤心可動天地驅兵力戰卒保城池使賊衆纍然卵破草折是可謂障百川而東之回狂瀾於既倒者也其視大唐四公又不知孰為優劣哉雖然平原日窘真卿棄之常山力竭杲卿死之睢陽之救不至張巡許逺亦連頸就戮夫真卿之去雖出於不得巳要非功成而名遂者三公死節雖人所難然身可死也其於民社之寄無乃誤所委乎故以功烈論之則四公猶有所愧獨於先生一無疵焉蓋節義等於四公而勳又逺也嗚呼至矣其不可企及哉此非特某之私言也乃天下之公論亦非特天下之公論也顧雖如先生謙沖退託亦不能自謂其不然也以今之人慕彼四公且勤若此至不知天下之人企望先生之盛德復何如哉某雖無似其生得與先生同時且家於閩中而喜於從學又獲與令弟為虀鹽之友家於閩中是鄰先生之居也喜於從學是習先生之業也復與令弟為友是其姓字可以達於左右者也其天幸如此顧雖家有老母不能逺去掃門執鞭以快平生之願而揮毫染翰寫此精誠亦安得獨後於衆人乎雖然亦僭矣以一介賤士而干萬世之功臣貴賤賢否不啻霄壤其率爾之罪固亦不勝誅亦何恃而敢為哉蓋先生既立已然之功必建未然之䇿雖竒謀妙算已定胸中而芻蕘之言或有可採者此某所以願有獻也某無他能解頗通古今曩聞盜賊之興私竊念某既治其已甚又欲阻其方來故仰求縉紳先生之論俯採匹夫匹婦之言考諸古而不違質諸今而可用研精極慮得十䇿焉欲進九重恨無因也效死有志窮鱗可惜謹寫之别卷以干台視伏幸先生留頃刻之暇聊賜一觀或無甚謬有可用者惟先生委曲而審處之非某敢自擇也昔者有為浙東觀察使者張籍相距於五千里外輒以書寓達而不以僭易為嫌得非學者所為大小君子當有以恕之乎又況籍盲於目既為廢人矣且不能遣語而託韓愈代之又其區區所以自敘者亦不過錢財以濟於藥耳是皆所無足取也某雖晚進不足比數於人然論才與志則非籍比倘使今日得出甄陶之下而不與草木同腐則竭力自效亦必不至為閣下辱也區區毫楮豈能既此心哉干冒鈞重不勝惶恐栗戰之至代人上縣令時年十五某聞士人趨走王公大人之門有為名者有為利者有不為名利者為名之士朝夕汲汲兀坐冥搜一篇之出惟恐人之不已知也為利之士訴窮敘德緘封求謁號寒啼飢若不能朝莫者有不為名利者其患難之人乎某也無狀蓋將患難之事仰首一鳴以期左右之見念矣某裳如垂磬地無置錐家父執役於公以給伏臘而某不免寄食於村落與十數學生相聚少資束脯以申反哺之恩驅馳近歲昨日方還雙親欣然遂寬倚門之望殺雞為黍各相勞苦父輕醉且遽然而起曰公有事焉不可緩也遽到公庭雁鶩以進反以酒故遂陷囹圄嗚呼痛哉一歲之勤將成一日之歡又豈知一日之歡反作一家之禍乎幸望先生察其終始之情原其平生之迹若果酣酒無賴舞文犯法者先生罪之某復何言哉但痛心疾首而巳矣若歲莫冬寒父子忽然相覩閣門之內把酒相勞則其情可恕某今日伏拜庭下幸先生垂骨肉之恩故雖殞滅亦不足為先生報也憂懼之深言不成章俟罪而巳與胡左司某頓首再拜丞公左司老兄某平日議論動與時左脫身風波荆棘滿路流落海邦不敢齒一時縉紳之列比者邂逅人傑從遊許時每聞徑論浩然欲塞天宇下視異類誓不比肩然後知吾道猶行於士大夫之賢者使抑鬱無聊之氣亦可以少慰其萬一也自左右持節西歸峻遷宰屬念欲上狀以致區區且以謂左右問學淵源蓋有所自而議論英發出人數等勤勞最久尚居庶官之右此又何足以為左右慶乎雖然社稷安危之所託四海生靈休戚之所繫一時賢不肖之所以進退實在乎廟堂諸公耳今與廟堂諸公反復議論能可否乎其間者二三都司而巳然則左右新除顧不亦重乎若吏抱成案則占位惟謹謾不省何事此固無可言者若以平日愛主憂民之心施於仕宦可行之地而從容乎二三知已之前此亦何惜而不盡言乎倘使吾言行於廟堂之上而澤及乎九州之逺則吾道固日行矣又何必身到廟堂然後為道行哉然廟堂之論其來舊矣熙豐間如司馬溫公與王荆公之所爭者曰是與非崇寧間陳了翁與蔡長沙之所爭者曰治與亂靖康間李丞相與耿門下之所爭者又不特是非治亂安危而巳其存亡所繫乎夫以二百年社稷存亡之機止在今日議論間聞之令人食不下咽則廟堂所以贊人主者與夫左右之所以助廟堂者亦豈可嘗試為之以茍歲月耶此事非公不可責非某不敢以責公亦幸祕之毋示他人也經曰有言不信尚口乃窮此道固窮於時矣豈窮於吾人哉惟丞相察之溽暑伏惟台候動止萬福更乞加愛以膺三接謹具啓不宣與李狀元工部某頓首再拜順之工部狀元老兄自羅源人去匆匆具狀並以惡語呈浼想無不達者即日溽暑伏惟台候動止萬福某客此餘年巢南之念無食頃置但以鄉里殘破之後斗米千錢雞豚蔬笋一切無有疫癘大作死亡相枕遂不能即去且復須止耳但不知仰俯三百指意將安歸乎水到渠成之語東坡其欺我哉雖然窮中之味非吾輩不能堪非處之久不能知其味之永也頃在都城陷身虜帳幸而脫歸又落風波之地列士梟首時無不免賴聖主赦於必死遂獲南歸方安畎畞為終焉計又為冦盜所迫來客海嵎今雖困卧流離豈不愈於前日九死之地乎以此亦能自安幸老兄毋重為小人念也老兄湖南之行竟可免否蘭省亦豈能久留老兄耶官無大小要行其志志不可行則袖手旁觀一時士君子進退出處之節彌綸獻替之道與夫談笑議論之餘其善者固可師而不然者亦可戒此杖藜觀物化亦以觀我生之義也豈不愈於紙上之學乎順之學富識高追配古人固無事此然舍此亦無以寓吾志也蓋所謂優哉遊哉聊以卒歲耳丞公數相過否輒以數字浼之議論狂直殊愧犯分然吾徒所以相好政在阿堵之中知我罪我俱在春秋乎貫道早晚如閩中想遂相從子安失意將不安此德和將罷新任文明亦以替去回首前日鳳池之遊豈非夢耶然人生孰非夢聚散無常即生滅法於此思之則生滅俱滅又何足計乎欲言無窮恨不能多幅何日握手一笑以寫此心臨紙東瞻精爽俱遺更冀惠序加愛以壽君親答黃德美某頓首某斥逐屏居精爽夢夢忽接來教詞意炳然固已驚畏徐門二章浩然有御風騎氣之興不覺掩卷而起曰天其或者遣此英才以慰我亡聊乎士人中固有高才者但筆力無來處流為馬異李赤而恬不知怪刻舟膠柱泰然自以為得意此有志於文墨者所以為其太息也德美句法抑按已逼蘇黃此天下士也豈易得哉然子路終身之所誦者孔子以為何足以臧蓋待子路非衆人之比耳德美浮沈里巷間能不作富貴之念乎能不恤世眼之青白乎能不畏禍患死生之逼人乎某聞志在一邦者當恤一邦之毁譽志在天下者勿恤也志在天下者當顧天下之重輕志在萬世者不顧也德美來書尚介於一邦此非僕所知也孟軻之文雄於戰國韓愈之文妙於李唐惟能不介其小者故能若是其大也蘇黃之文幾於比肩及其絶塵黃且瞪若豈筆力之罪耶然東坡謫居海外若不復振者而剛大之氣尚充塞乎天地之間山谷稍不得意則作小偈以贊王介甫間於東坡微有譏焉則生死富貴巳懾其氣爾所以為山谷者果安在哉吾黨均學蘇黃者也中有涇渭不敢獨享因書以告君子無以示外使不知我者而怒生癭也某近有數篇但謫籍不敢寄逺有新作無吝見示未會切告為器業自壽不宣答張居實某頓首再拜久别辱書開緘如見君子寵喻詳備非愛人以德者不能也某何人當宣和之末見九州需索東南一空而花石之奉鼎沸無已學校諸生仰瞻白雲俱相顧泣下且自度曰聖天子未嘗殺一諫臣士大夫吞聲端坐願固位耳偶得數章槌鼓以進雖為虀粉不顧也聖意包荒未賜誅殛今得邸報乃有召命是將責我以前日未死之軀以為今日報也白日尚在赤心敢渝區區牛李豈所學哉異時有違此語公當出之則僕有何面目更行天日之下耶反覆來書蓋知已者以報公所以不得不盡也春且老傳道佳勝未見幸為吾道自壽不宣栟櫚集卷十四
