body:
  text: 栟櫚集巻二十五宋鄧肅撰評論詩評或人問詩於鄧子鄧子曰詩有四忌學白居易者忌平易學李長吉者忌竒僻學李太白者忌怪誕若學作舉子詩者尤忌説功名平易之過如抄録帳目了無精采竒僻之過如作隱語專以罔人怪誕之過有類乞丐道人作飛仙無根論語功名之過如諂諛卦影詩不説青紫則必論旌麾此尤可羞也若能不作此數格然後可以論詩東坡曰要知西掖承平事記取劉郎種竹初此雖平易自有精采又曰陽蟲隕羿喪厥喙羽淵之化帝祝尾此雖竒僻自非隱語又曰歲寒冰冷天地閉為我起蟄鞭魚龍此雖怪誕要非乞丐道人所能近似也至論功名則曰正與羣帝驂龍翔獨畱杞梓扶明堂是豈復有卦影氣味乎此四者不可以筆墨求之要運於筆墨之外者自有所謂浩然之氣充塞乎天地之間學者不可不知也論書持筆如馭將柔順從指者皆非良材而猙獰縱逸者亦不可制要當興伏抑按毎從人欲而紙上戛戛自有生意然後為妙筆也近世人多作無骨字盱睢側媚有乞憐之態故其所用者皆無心冗毫也此筆才入手則諸葛所製當為生硬矣不能用諸葛筆而欲作字如項羽棄范增而欲取中原也其可乎墨以黑為體以光為神神采輕浮不能深黑譬如紈綺子弟濃字大畫黑而無光亦一田舍翁耳眉山老仙謂陳瞻墨潘生不逮瞻何為者敢冀潘耶此論未公吾不慿也硏不必甚佳者比嘗見士人相矜曰此端也其色瑩彼歙也其文緻不知文與色亦何與於墨乎皆好竒之過也大抵石在山者燥在水者脆脆者不能以制墨而燥者又不行筆二者胥失也去是二病雖鳳咮足矣亦何必近捨皇甫湜哉張長史脱帽露頂抵掌於八仙之中今物化數百年矣毎觀其字則恍然逸韻猶在目前顔魯公作字端嚴可畏張之屋壁奸人胆落與長史無毫髮相類而史氏謂魯公獨傳其法何也蓋字法三昧當以神悟之既悟矣如嗣宗老宿或以棒或以喝或作老婆態種種不等要之皆西來意也本朝評書以君謨為第一信嘉祐之間可以魁也蘓黄繼出文妙天下而書又能張其軍於君謨若無甚愧者然君謨如杜甫詩無一字無來處縱横上下皆藏古意學之力也蘓黄資質過人筆力天出其太白詩乎深得其趣者自當見其優劣矣米芾楚狂者也作字清逺有晉宋氣所恨者但能行書耳真如立行如行草如走三者不可闕一也若用春秋之法責備賢者則米芾在所惜也丹霞賾師學余書未半年亦有可觀者今來求益吾術窮矣姑使之擇筆墨之精者以利其器然後品藻古今能字者以俾其自取耳賾勉之風韻不凡他日所學當有不止於書者吾將併得而告也政和戊戌春栟櫚鄧肅朝陽堂書栟櫚集巻二十五
