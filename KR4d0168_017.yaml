body:
  text: 栟櫚集卷十七宋鄧肅撰記新建三清殿閩水曲折行亂石間鼎烹雪噴相應而起獨沙邑有溪廣千餘尺紆餘舒緩湛如青銅其逺至於二十餘里不聞湍激聲南有七峯草木蒼然四時不改北列萬井樓閣翬飛不可以數計昔令尹自縣治而南方舟為梁徑抵七峯之最西者闢山為堂瞰危為閣下俯風雨旁列星辰似非塵寰中蓋沙邑據閩中之勝而是堂與閣又據沙邑之勝此登賞之士所以冠蓋相望而遊宦於此者尤切切焉若以不得款於是者為大可恨也今令尹郭侯見而嘆曰嘻此勝景也是真可喜者雖然有家焉必有仰事俯育之計有職焉必有民社之憂今為家者棄其家以嬉為職者捨其職以嬉舉邑之人若狂焉無乃以勝景為纍乎於是呼道士張唐的居之鑿山作殿中設三清像巍巍堂堂與閣相稱昔日妖歌曼舞之地今化為斂笏垂紳之宫昔日窮奢極欲之境今化為悔罪懺非之地昔者邑官晏此以虐天子之民今也邑官叩此以請天子之壽是非善惡豈不相尚乎郭侯此舉其可謂卓然矣且叩豫門請以文記之豫筮仕之初嘗待罪鴻臚寺道釋二教兼所轄者其記之為宜且嘗因賤職之簡得以考其教之所自來矣其源出黃帝其道再盛於老聃其末流詭異有真可駭者其為家三十有七其為書九百九十有三篇凡有天下者必崇其道論其尤者有三帝焉秦曰始皇漢曰武帝唐曰明皇是三帝者才智絶人蔑視一世窮六合之大不足以厭其欲於是有浩然御風騎氣之志煉丹飛符雜以左道自謂其法可配天地殊不知飛騰之術卒不能濟反禍其國真可痛哉此學孔子者所以不欲言老聃氏也雖然漢高祖之取天下則以張良為最其治天下也則以曹參為最良之道蓋慕赤松子而參之居則避正室以舍蓋公是則道家之術又若無負於天下者蓋漢高祖所以取參與良者在道之本不過於清淨恭儉無為與民息肩而巳矣而始皇武帝明皇之所尚者區區竭力以事其末故誕妄不經者得以行其志其治亂賢否所以相絶不可同日而語也今郭侯崇奉之志既在其本此吾所以記之不敢輒辭夫未流滋蔓變怪百出可以惑人主而禍天下者皆非黃帝老聃氏之道也豫固嘗斥之矣奚獨孟子能闢楊朱哉當有辨之者南劒天寧塑像昔者釋迦嘗為其母說法於忉利天宫久而不返為之君父者不得以見之目連行空往返者三刻其像以歸以慰當時拳拳者故後世之士欲見佛菩薩而不可得則必效焉此塑像所以興也東漢之後教入中原有妙傳此道而傑出於其徒者如丹霞德山皆號第一流然丹霞禦寒則燒木佛德山說法則徹塑像其於目連之論若相反焉余每疑之而考其所自矣蓋由迦葉至師子二十三世而離離而為達摩由達摩至忍五世而益離離而為能為秀能秀之辨姑置未論禪教之判其來巳久自達摩既離之後不立文字則無復以教相為主者此丹霞德山所以不得不與目連殊也雖然達摩之道其果離於佛耶其亦未嘗離耶色空未融則物無非妄一視而空則物無妄者既謂之妄則無物可存既曰無妄則何所存而不可乎是故纍土於地屹高尋丈假以金碧丹雘之飾望之儼然固不離一聚塊耳然方為聚塊夫人皆得以賤之一旦建立於上雖頑夫悍卒亦必肅然如臨父母是可以妄斥之耶其功蹟之妙雖幻於作者之手而瞻仰之誠則生於見者之心原其手之所以運用推其心之所以孚感天機忽然不容擬議教外不傳之妙巳行乎其中矣然則丹霞德山之道亦豈殊於目連者乎此主禪悅者其於佛氏塑像所以未能釋然不以介意也南劒天寧者大禪寺也政和間廢為道宫奧殿佛像民不忍毁竭一城之力遷於東山建大道場靖康之初錫還舊額士庶紛來無瞻拜之地羣議鬨然欲昔所遷者或曰東山道場自不可廢有石侁者縻金錢二百萬鼎作塑像雄偉莊嚴過於曩昔而東山勝地因得不毁既事且攜住持僧淨暹書請記於豫曰昔李遷修藥師院歐陽公為之記故遷得不忘侁其遷之流歟願夫子記之于曰嘻地瘠人貧無如七閩者居民脫損一錢不益於用怏怏然若切肌膚者纍日今石所損動以萬計其於妻孥口腹之奉了無與焉問其所以則曰天寧道場祝君父萬萬壽不可以一日廢其區區之誠有足嘉者豈止為李遷之徒哉故余為書之且記其所以然者異時禪悅之士來造天寧一瞻塑像釋然而悟不必掃滅教相止了達摩之心將歸德於遷耶將歸德於侁耶其亦將有取於文乎東坡嘗有言曰譬如油蠟作燈燭不有之始終不明當作如是觀可也沙縣福聖院重建塔塔寺之建自罽賓國始舉國之大不過二所佛氏且從而贊之以為希有事然則佛塔豈可多得耶唐武后欲創祠於白馬坡張廷圭力諫曰窮山之木以為塔不足高也后乃止然則佛塔豈易建耶然近年以來井邑盛處必有浮屠計天下之大當以萬數難易多寡何相絶如此豈今日佛教之盛非昔者比乎抑天下富庶而土木之功易於創造乎余嘗疑其說以質諸長老曰凡建造者為殿以供佛為堂以供僧為橋為路以通往來是各有所為而非偶然者獨浮屠之建動切星漢其功甚勞其費不資而於僧徒未見其有益焉然則古今所以難之而不欲多建者豈非為是耶長老曰不然此莊嚴之道也今人未必非而古人未必是也今夫假木石之功而飾以丹青之麗光芒璀璨卓然出井邑之上凡有目者皆見而仰之曰佛菩薩舍其下凡十人睹之而一人能作正念則千而百萬而千展轉不窮當有不可以數計者是則莊嚴之勝以五采說法而觀瞻之士得以目聽之其助教化固不小矣而謂之無益可乎此阿育王之建塔所以至八萬四千而佛氏闕不以為多也南劒之沙縣有寺曰福聖古道場也三朝宸翰實鎮其中古塔中立蓋纍數百年舞風沐雨望之默暗不足以聳人住持僧端一毅然撤去曰吾將協衆力以新之銖積寸纍殆十餘歲斫削之功僅十五三易主僧事益因循塔忽倒影在密室中雖雨暘弗變也衆復駭之益加重焉大丞相李公為之濃墨大字以題其額又録宣和褒封之制而繼之以泗濱驚世之迹刋於塔右將以誨成適公還朝而主僧之志老矣建安郭侯來宰是邑乃喟然而嘆曰君父遺蹟既臣子所不敢易而塔廟之設乃遺蹟之所託者也於此不竭力焉恐非人臣之道也諺曰作浮屠者必合其尖將以合之捨我而誰哉於是率邑人之彥者告以故且令主僧了機從而奔走之故富者出財能者竭力亹亹相勸殆有不能以自巳者閲明年而塔成實靖康改元之春也其級五其廣四十有八尺而高三十丈雲煙縹眇之間金碧相照夜燈數枝煥如星斗嗚呼盛哉豈特使百里之內遷善於觀瞻之際而悔過於杳冥之間乎三后之志且不廢於海濱而雲漢之章人天共仰蓋將與日俱新矣夫仰而事君俯而化民今一舉而兩得之其可謂賢今尹哉余適罪逐還鄉與觀勝事侯乃以記文見屬余曰嘻昔韓愈氏必欲火佛氏之書而廬其居然後為快於心至僧澄觀能造浮屠於淮泗之上欄柱雄麗高三百尺愈遂作詩以美之且謂當時公才吏用無如師者遂令澄觀之名同愈不朽得非寶塔之建於有為佛事為甚難顧雖倔强如韓子者亦不得以却之乎今莊嚴是塔而主其寺者僧惠深也具正大法眼為達摩嫡嗣若非澄觀所能髣佛余嘗從之論西來意又非若退之以談佛為諱者固願以筆墨贊之而況邑大夫切切外護之志在君與民又於豫為詩酒之舊見而屬之勤至於再三者乎此皆余所樂書者敢以不才辭興化重建院余嘗謂人之才術智識常生於不得已而死於因循者則亦偷安而巳矣此天下之通患而祝髮壞衣者尤甚也何以言之風雨寒暑不可以切身鹿豕不可以雜處飲食不具居處不可以得衆倘未嘗有寺而欲闡揚祖道者其於創立豈可以巳乎若夫既有寺宇粗可以居而歲月相仍摧風爍日主之者雖惻然作念欲一新之倣徨四顧曰陋者可補也頽者可支也汙漫者可飾也因陋就簡吾亦可以安也又何必盡毁舊廬化出蓮宫然後為快於心哉因循偷安是亦人之常情耳南劒沙縣有寺曰興化屹立山間雖云簡古然建於中和之初梵宫所當有者無或不備光化間嘗敕翰林以題其額政和未又易律為禪以其在閩中亦卓然號為古道場三百年間未聞有惡其弊者政和丙申法湛主此亦可以巳矣師乃愀然不能以自安曰屋老如許門宇蕭然亦何以為佛地哉扶傾立仆茍新耳目瑣瑣然一二治之非吾志也於是即寺之左得地爽塏斬茅焚翳乃遷故址顧雖齊庖索然殆不能煙亦未嘗過計縮身節口益堅今力得匠者數十人乃躬自執爨如事其師雖風雨迷天弗顧也誠心旁達鄉井翕然由是富者出財壯者竭力百日之間輦土運材有至於三千指者故閲十年而寺成巍然中立危棟翬飛欲凌霄漢堂堂塑像亦妙絶一世為堂於上者二內而晏寢外而演法為堂於下者三以供羅漢以齊水陸以飯緇素香積有㕑聲鐘有樓翼之以廊而重之以門左右前後繩繩翼翼計寺內外既無毫髮不具其雄麗莊嚴又非前寺所能髣佛而尺椽片瓦俱出師力未嘗取用舊者嗚呼難矣哉是可以因循而不因循者也其勉勉自克志力俱到當於前輩求之故余因其求記乃詳為書焉且以為怠惰委靡者之戒云師初建法堂石其基者再凡再圯師憂甚忽省往時夢建是寺有龎眉皓髮者告之曰寺基更深二尺許乃真道場嘗試闢之恍如夢中又得石柱六以建殿宇有足痕者尺餘在石柱之陰見者皆云此佛迹也非雕鐫所能至此寺之興所以神速如此嗚呼夢中之境變滅須㬰石中之迹千古不變其將以夢為虛而以石為實乎通乎晝夜本無二理石固非實而夢亦非虛也夢中占夢師固未暇然既賴此以興寺要了此以為寺之所以興故余併為師論之栟櫚集卷十七
