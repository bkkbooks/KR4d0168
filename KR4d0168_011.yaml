  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0168_WYG_011-1a, image: WYG1133/WYG1133-0306a.png}
body:
  text: 栟櫚集巻十一宋鄧肅撰樂府臨江仙帶雨棃花㸔上馬問人底事匆匆于飛有願恨難從大鵬摶九萬鸚鵡鎻金籠怱怱便為千里隔危岑已接髙穹回頭那忍問前蹤家留千里外人在斗牛中右一百尺危樓初過雨清風凛作輕寒一聲漁笛在雲端黄昏簾幙捲新月半欄杆青翼不来音信斷雲窓杳隔三山何時携手便驂鸞今宵同勝景玉斝不留殘右二春雪一甌扶醉玉翩翩兩腋生風柳腰無力殢雲蹤陳郎投轄意分袂忍匆匆白玉琢盃龍麝泛瀼瀼天酒爭濃何妨一飲上青驄晴空行夜月緩轡水晶宮右三劍水泠泠行碧玉扁舟一葉吹風玉人招手畫樓東浩歌隨月去春在小樓中簾幙低垂圍篤耨雕膓笑捧香葱謾將雨意作雲濃單于吹未徹門外響玲瓏右四雨過荼䕷春欲放輕寒約住餘芳南園今日被朝陽瓊葩開萬㸃塵世滿天香百卉叢中紅紫亂玉肌自笑孤光清風剪剪過紗窓餘酲空一洗不數夀陽粧右五獨宿禪房清夢斷雞聲喚起晨鐘出門曉月耿寒空小池凝翡翠竹外跨飛虹梅塢不知何處了傍籬臨水重重嘯歌只在冷香中人間那有此天上廣寒宫右六夜飲不知更漏永餘酣因染朝陽庭前鶯燕亂絲簧醉眠猶未起花影滿晴窓簾外報言天色好水沉已染羅裳檀郎欲起趂春狂佳人嗔不語劈靣噀丁香右七夜靜黄雲承寳韈九疑人道羊家蕊宫仙曲送流霞東陵分玉井逺勝隔荷花綽約旗亭沽一笑衆驚飡棗如𤓰畫橋烟栁忽翻鵶醉鬟傾緑醑參月共横斜右八樓北樓南青不斷晴空總是春容先来無處問郎蹤那堪風不定雨盡一窓紅初恨水中徒捉月而今水月俱空謾將雨意伴雲濃臨風千㸃淚不到浙江東右九浣溪沙雨入空階滴夜長月行雲外借孤光獨將心事歩長廊深鎻重門飛不去巫山何日夢襄王一牀衾枕冷凄香其二傍竹柴門俯碧流見人無語眼横秋鳴機軋軋弄纎柔定有迴文傳竇氏何時銀漢度牽牛歸来風雨夜颼颼其三宿雨潜回海宇春曉風時散日邉雲熈熈人意一畨新破睡海棠能媚客舞風垂柳似招人春衫歸去馬蹄輕其四欄外彤雲已滿空簾旌不動石榴紅誰將秋色到樓中瑪瑙一紅浮翠玉瓠犀終日凛天風炎洲人到廣寒宫其五髙㑹横山酒八仙煙雲不减九華妍暖風瓊樹倚樓前妙唱一聲塵暗落靚粧四座玉相連驂鸞何日共翩翩其六二八佳人宴九仙華堂清靜鬬春妍瓊枝相倚妙無前良夜黄雲来縹緲春風碧酒意留連花間蝶夢想翩翩其七半醉依人落珥簮天香不數海南沉時傾秋水話春心已覺吹簫歸碧落從今禊飲笑山隂金盆休惜十分春其八海畔山人碧玉簮天涯消息嘆沉沉頼逢傾國洗愁心莫為世情生旅况且因樂事惜光隂明朝紅雨已春深菩薩蠻隔窓瑟瑟聞飛雪洞房半醉回春色銀燭照更長羅屏圍夜香巫山幽夢曉明日天涯杳倚戸黯芙蓉涓涓秋露濃又萋萋欲遍池塘草輕寒却怕春光老㣲雨濕昏黃梨花啼鳥粧低垂簾四靣沉水環深院太白困鴛鴦天風吹夢長又飛鴻欲帶春風去柳絲却織春風住去住任春風只愁樽俎空今朝鞭馬去又得髙陽侣半醉踏花歸霜蹄驕欲飛又簾旌不動重餘熱髙堂誰送能言雪一笑下人間天風襲坐寒歌聲雲外去句譜蘇仙語曲罷一樽空飄然欲御風又亷纎細雨連天逺紗窓不隔斜風冷花柳自生春無聊空閉門雙雙携手去回首烟汀暮嬉笑在髙樓知人牢落不又垂楊裊裊腰肢軟寒溪練練琉璃淺短艇卧吹風生涯一葉中五湖須徑去何用若耶女烟雨暝沙汀花香喚酒醒又腰肢欲趂楊花去歌聲能遏行雲住杯酒醉東風覊愁一洗空謫仙清飲露意在飛瓊侣未醉那求歸新詞句欲飛又歸心謾逐飛雲去歡情却為芳菲住翠袖擁香風寧辭玉斝空主人承湛露元是臯䕫侣早晩定遄歸商霖四海飛又和李狀元騎鯨好向雲端去踏花偶為狂朋住語笑凛生風眼髙四海空羊裘衝雨露我是漁樵侣已趂白鷗歸長江自在飛又一心唯欲南園去東山有意留難住曽慣識追風馬羣今已空金盤盛玉露情絶鴛鴦侣破賊凱還歸冲天看一飛南歌子竹影窺燈闇泉聲語夜長小窓無夢到髙唐獨飲三杯長嘯歩脩廊月午夜衫冷蓮開風露香欄干西角下銀潢我欲乘槎天上泛寒光右一晧月明顋雪冷風亂鬢雲髙樓簾幙夜生春半醉倚人秋水欲斜傾曉雨雙溪漲歸舟一葉輕杳無青翼寄殷勤目斷烟波漁火又黄昏右二雲繞風前鬢春開檻裏粧鳳屏清晝靄龍香淺畫娥眉新様逺山長比翼曽同夢雙魚隔異鄉玉樓依舊暗垂楊樓下落花流水自斜陽右三澤畔爭撏草車前自喂牛鳳城一别幾經秋身在天涯海角忍回頭旅夢驚殘月勞生寄小舟都人應也望宸逰早晩葱葱佳氣滿皇州右四訴衷情送李狀元三首乘鸞縹緲過三山逰戯下人間金樽不辭頻倒春色上朱顏依暖玉掠風鬟語闗闗惟愁漏短雨㪚雲飛騎月空還其二龍頭一語定閩山黄色上眉間詔書促歸金闕玉帶侍天顔攏象板嚲宫鬟唱陽闗從容禁闥若念林泉應寄書還其三從来雲雨過巫山只記夢魂間何如醉逢傾國春到一瓢顔歌窈窕舞雙鬟掩雲闗重城五鼓月下西樓不忍輕還長相思令一重山兩重山山逺天髙煙水寒相思楓葉丹菊花開菊花殘雁已西飛人未還一簾風月閑又一重溪兩重溪溪轉山迴路欲迷朱欄出翠㣲梅花飛雪花飛醉卧幽亭不掩扉冷香尋夢歸又紅花飛白花飛郎與春風同别離春歸郎不歸雨霏霏雪霏霏又是黄昏獨掩扉孤燈隔翠帷西江月臘雪猶埋石巘春風已入梅梢冷香隨馬上瓊瑶不與時人同到拍手恐驚星斗髙歌已在烟霄醉呼玉女解金貂笑問何如蓬島右一風薦荷香剪剪月行竹影徐徐㣲聞環珮過庭除恐是陽䑓行雨玉筍輕籠樂句流鶯夜囀詩餘酒酣風勁露凝珠我欲驂鸞歸去右二生查子執手兩澘然情極都無語去馬更匆匆一息迷回顧孤舘得村醪一醉空離緒酒醒却無人簾外三更雨感皇恩翠竹謾連雲天風不到簾幙重重自熱惱冷香忽至愛惜當同芝草井花浮碧玉炎威掃酒渇想東隣憂心如𢷬納履生疑謾悔懊未容沉李相對樽前傾倒報君惟短句瓊琚好一剪梅題泛碧齊雨過春山翠欲浮影落寒溪碧玉流片㠶乘興挂東風夾㟁花香擁去舟樽酒時追李郭逰醉臥烟波萬事休夢回風定斗杓寒漁笛一聲天地秋蝶戀花送李狀元執手長亭無一語淚眼汪汪滴下陽闗句牽馬欲行還復住春風吹斷梨花雨海角三千千叠路歸侍玉皇那復回頭顧旌斾已因風月駐何妨醉過清明去江城子酒䦨携手過回廊夜初凉月如霜笑問木犀何日吐天香待挿一枝歸斗帳和雲雨殢襄王如今滿目雨新黄遶髙堂自芬芳不見堂中携手舊鴛鴦已對秋光成感慨更夜永漏聲長栟櫚集巻十一
