body:
  text: 栟櫚集卷十五宋鄧肅撰序瑞花堂政和間有瑞花生於葉隆吉超然家狀如牡丹紅瑩不謝而未嘗有根衆雖異之竟不知其為何物也超然一旦抱其所能貢入成均且十餘年靖康間以智謀中科得官未試建炎二年再擢進士第易紫衣藍歸拜其親里閈榮之友人鄧肅志宏為榜其所居曰瑞花堂且語之曰物亦有不根而生者乎草木無有也造化之英不能自鬱其達而在上則有輪囷之雲扶疏之桂行於天而行於月若無俟乎根者其降而在人也則所謂將相公侯寧有種乎是也今超然以寒儒家連取文武二科猶掇之也異時將相蓋唾手可取較之卿雲桂月初不試根若無甚異者然則瑞花之生豈偶然哉雖然暗者須明月乃燭之旱者求蘇雲乃澤之彼蒼蒼者豈徒為是無種之物以駭人哉蓋以種種而生者政有賴於此耳超然其勉之吾輩所為將相云者亦豈徒為觀美而巳乎今天下須明求蘇者蓋不可一二計超然其勉之建炎三年七夕鄧肅序丹霞賞音文集邵武軍泰寧僧明賾走人四百里以書抵豫曰吾師得士大夫詩文亡慮三百篇雄文傑句日傳千紙師不得以私之也僕將鏤於板命之曰丹霞賞音集夫子厚於吾師者請為我序之余告之曰若師農家子忽有所遇遂傳心印坐斷白雲法可參又能出其糟粕作詩誦三昧如畫沙印泥不事雕鐫雖貫休齊巳等輩旬鍛月鍊有不得其髣佛者又何待士夫為之賞音乎而況三百篇之中有為社稷臣者有為文章伯者有為道山之秀者有為柏臺之英者有宣埋輪之威者有布愷悌之政者有布衣韋帶而尚友古人者鈎章棘句光芒相薄皆不在人下而又何待潦倒不堪者從而序之乎雖然世間遊戲法門類相假合若以序為不必為則諸公之文雖不必作可也若以諸公之文為不必作則丹霞之迹雖不顯可也是將頽墮委靡蕩然不可收拾而與兔角龜毛同歸於無用之域矣豈中道哉蓋聞七佛之出世達摩之西來與三藏四萬八千卷之流布於六合內外者譬猶煙雲出岫本無定體而風行水上偶爾成文故其建立之迹闡揚之音雖轟若雷聲而亦未嘗不淵默也然則丹霞示現之迹士夫從而賞之明賾從而刋之僕又從而序之是亦循斯須矣又孰有不可者哉丹霞法名宗本棄妻而庵居得度五年風號露泣之地化為金碧太守請於朝以名其院所謂丹霞是也世間人或得其誦者即以吉凶壽夭決之猶蓍龜也此特其善者機耳丹霞豈作意哉明賾作字吟詩亦超然不凡而見解的的不落一邊蓋其師之嫡嗣云宣和七年中元瑞芝軒書丹霞禪師行化曾子固嘗言世人視損一錢可以易死寧死無所損余始惜其言之過既而久處里閈乃信其言之不妄也今本禪師一瓶一鉢來自丹霞以開田因緣化於沙邑未踰月而所獲幾百萬是何其速耶豈吾鄉居民固不若子固之所言耶不然則師亦何自得此於人哉怪而問焉有對者曰嘻師異人也其言人之禍福死生輒以期至故智者多其能愚者冀其福敢為不善者又將隱其過此所以摩肩接踵各攄所藏無敢為師嗇以是集事又安得而不速乎余仰天而笑曰夫有是哉夫所謂丹霞者豈晉佛圖澄耶豈唐僧一行耶明數以先人之禍福雖草而蓍闕如龜類能及焉吾又何為而心醉哉雖然亦有可占者乃往見之興居之餘遂即其所言禍福死生巳著於人者聊復訊之師方且悠然而辭若不以是而自多也夫既不以是自多則必有超乎世者余乃易色變容不敢以世俗之所問者叩焉徐而聽其款語味其所詠之詩超然不復塵中見解禪不能枯律不能縛雖如我等亦不能測其涯涘殆不知其果何人也其與人之頌若所為文初不經意一瞬百紙颯如風雨豈以錐畫沙乎豈以印印泥乎抑八窗玲瓏而人之善惡莫得以逃之乎不然則其姑示之以天壤使人得以相之故丹霞道場能就今日耶吾皆不得而知之也因其就行姑為之序太平興國堂頭璨公語録佛菩薩語流布人間凡五千四十八卷而一祖西來直指心源不立文字若佛若祖孰少孰多曰教曰禪若此殊軌殊不知佛菩薩語雖纍億萬亦未嘗輒立文字而達摩直指心源雖默無一語而五千四十八卷巳在其中矣太平堂頭璨公頃從蔣山何嘗得兔昔住太平本自亡錐據師子座作師子吼未嘗為人世説毫釐法四方學者皆腦門點地拾其殘膏而襲藏之旦扣栟櫚居士鄧某湖南之鴻儒以序冠焉居士曰嘻此特其土苴耳豈其真哉雖然土苴之外何者為真一視而空頭頭皆是有語亦可無語亦可雷聲淵默本自同時孰為五千四十八卷而孰為不立文字者乎在佛為弟子在祖為嫡孫蓋道一也門人弟子若因此以有悟則謦咳動息皆西來意而況所揚之般若乎若守此以求師則拈花微笑巳是剩法而況所論之葛藤乎悟之者天地一指守之者毫釐千里反以問師了無語焉余姑為門人者序之耳師名了璨得法於蔣山勤其祖蓋出於楊岐之下作字吟詩皆得遊戲三昧而未嘗作意也大丞相李公嘗訪師於栖雲悅之許為具眼人遂結看經社世人因以多師嗚呼師豈止具眼看經而巳耶當有辨之者栟櫚集卷十五
