  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0168_WYG_006-1a, image: WYG1133/WYG1133-0285a.png}
body:
  text: 栟櫚集卷六宋鄧肅撰古風和謝吏部鐵字韵紀德切切寒蟲常在耳未識詞源萬斛水忽開玉軸見竒文光怪摩空亂眸子太傅江左風流人靈運在家元不嗔家世千年今復振落筆飄飄語更真頓足忘言驚妙絶欲續貂蟬恨才拙鉛刀那敢望神劍舒屈無妨豈常鐵右一窮居如將豆塞耳一泓自足牛蹄水那知臨境有人豪笑觀造化但兒子筆端萬字驚倒人春色秋風隨喜嗔一讀錦囊殆仙去欲借銀軿遂朝真更當負笈慰愁絶慿公一掃平生拙門人益親自得回㑹觀踏破門限鐵右二世上區區蠅狗耳不復解纓濯清水只知貪雀不留珠可憐認賊翻為子珍重謝公天下人冷居林泉曽不嗔雲煙萬木觀不足闕真髙節凌雲亦竒絶不綰六印未為拙闕只有布衾冷似鐵右三仕途例皆諂笑耳隨盤方圓無定水前年天子思竒才霜臺曽擢右君子泛觀中外倘非人髮上衝冠聊一嗔那顧城狐并社鼠好惡無私喜怒真底事年來迹又絶笑道林泉似藏拙慿誰去斬佞臣頭請公速鑄楚山鐵右四四海紛紛筝笛耳誰識子期志流水韵髙調古自難酬得意政須副墨子我公聲價第一人積薪居上笑不嗔但將佳句妙今古逝變雕蟲返太真孟軻嘗續吾道絶功與神禹論工拙先生今復回狂瀾豈減旌陽柱鑄鐵右五引領門牆數舍耳劍之水源自樵水公邵武人也褁糧問道嗟未能參前倚衡見夫子自笑昔為塵土人春狂時逐賣符嗔年來懶惰百事廢洗空人僞惟葆真更餘净業磨未絶强繼彌明不知拙豈是螳螂敢當車貘獸從來食銅鐵右六李白嘗言人有耳不當徑流如川水男兒出處自有時何須鋭意楚狂子公今無意世間人北山有靈定不嗔天子政作唐虞計谷口那留鄭子真佇觀大手稱竒絶致君却笑前賢拙坐使梯航到鬼方來尋九州貢璆鐵右七眼中儒生聊爾耳僅免春闈飲墨水可憐四海萬青襟却愧建安六七子誰似丘侯獨可人日無千篇即怒嗔腐語陳言俱掃滅竒文秀句出天真虎頭固已稱詩絶更逢安石分工拙新詩為侯特發揮照人之明鑑磨鐵右八結交要在相知耳趣向不殊水投水請看丘侯對謝公箭鋒相契無多子丘侯平日論律人詳及謝公喜與嗔一得新詩即傳借許久誇談今見真車馬爭看紛不絶新詩那簡茅簷拙脫腕供人嗟未能安得畢升二板鐵右九三吳惡少飛緑耳殺人如麻壅流水餘風往往到江閩魚爛鳥驚父離子紛然回顧作流人我侯正色回一嗔坐使倉黃萬老弱復歌太平養性真百弊紛紛俱杜絶四境無虞安朴拙方信哲夫自成城不須十仞堅削鐵右十忘心政須麯蘖耳醉仙如吸百川水男兒不復問聖賢杯酒力辭真豎子我侯度量􅐦千人不滿金鍾却怒嗔酒酣那復迷朱碧苗莠猶分僞與真人言狂藥要須絶恐潰肺腸語亦拙那知真氣不可侵烏府如今肝是鐵右十一邑官有和者亦以詩寄之其人自云禦方冦有功寂寞相如四壁耳陋巷蕭然窮飲水雖似退之厭權門時作封人慕君子慙愧知音箇中人近前不學丞相嗔掀髯抵掌論今古肺腑恢然笑語真頃余學問非三絶操瑟千齊謀更拙棲遲何以酬已知吾道不移研鑄鐵右十二丘宰生日律管才吹九寸耳帝遣𤣥冥下司水百度稍多百四十愛日差長十君子已剝羣隂驅小人四海熙熙語復嗔因闢金關謫太白不許天庭久煉真太白塵緣固未絶肯將天巧形世拙㑹施霖雨滿人間歸對千年忘恙鐵右十三陽復朋來七日耳黎明當動有泉水冬至後十日泉水動此以宣和辛丑厯推之耳隂隂寒谷未生春天閔斯民如赤子遂因天下生竒人禆歌襦袴無怨嗔朅來割雞多暇日逸韵飄飄騰九真瓊室瑶池津不絶冷笑人間衛生拙三竊蟠桃顔益童那復虬髯靣如鐵右十四和謝吏部昔年怨聲常滿耳紛紛女巫未沉水天教我侯慰逺人坐令盜賊化君子期年仁政遍人人撫之如子不須嗔吏民欲欺亦不忍出言洞見胸中真要圖書問久已絶人皆巧中渠寧拙優遊黃卷有餘歡此志不回端截鐵右十五自叙瑟瑟霜風欲聒耳小院枕衾如潑水夜清火冷不成眠起就短檠閲諸子掩卷嗟嗟今古人闕可嗔風日相憐紛無已一笑𤣥之妄亦真我今是非兩俱絶百巧百中不如拙寂然無復一念邪那有黃冠下鞭鐵右十六惡聲不入伯夷耳嚴陵拂袖釣寒水古來豪傑例幽居佩􅀈肯隨舟人子造化爐中忽為人笑笑隨緣又何嗔細語麗言俱入妙醉中不必更陶真年來三復韋編絶得趣無多一味拙物外翛然我已仙不愁石髓堅如鐵右十七萬物紛紛一馬耳百川不同均一水不將彼是作殊觀坐使須彌納芥子李白髙視空無人審言更作牙官嗔可憐紙上較輕重畫餅象龍俱未真我師宣尼四病絶抱甕寧作漢隂拙萬象紛紛不敢侵真室何須樞楗鐵右十八遊山髙岩去天尺五耳下飛瀑布千尋水山間瘦竹映枯松嵗寒相對凛君子杖藜去去尋幽人剝啄扣門公勿嗔凡骨膻腥倘不厭願供薪水看修真髙人隱几語言絶大巧深闕拙無乃誤逰天目山偶見唐公冠帶鐵右十九人生要在行樂耳四化相磨逝流水溪山佳處飽遨逰莫為羶葷親俗子解龜誰顧謫仙人玉局題牆亦遭嗔世人例作葉公解但喜畫龍誰識真何如便與塵寰絶醉倒莫嫌茅店拙青驄門外繫垂楊旋乞青禾銼白鐵右二十門前如市不入耳忘言隱几心如水紛華時逐長安兒清爽何似毛錐子我雖事業未如人天公不等吾勿嗔獨步髙山尋兀室默坐燒香已悟真世事繽紛俱謝絶叩角自歌愚且拙誰暇投書追賈誼更憂銅弊雜鉛鐵右二十一對酒世上紛華蟻穴耳東流不作西歸水號寒那用學孟郊捉月要須追李子一樽忽爾逢故人髙談往事古人嗔人間目下多忌諱闕醉鄉真但得如意酒不絶四壁莫闕費數州鐵右二十二八斗一傾聊熱耳開匣時觀三尺水指天喝月使倒行揚波直欲斬蛟子安得知音吾黨人相看青眼不余嗔笑驅八蠻有竒䇿開懷聊與話誠真可憐吐哺風流絶乞巧未遑姑守拙坐觀明月侵蝦蟇空使玉川懷寸鐵右二十三送成彥尉邵武萬竅于喁風割耳梅影橫斜耿煙水殺雞為黍政追隨七峰共作隱君子忽舉陽關餞行人去去莫愁官長嗔但知所領馬曹似清談更覺子猷真谷風嘗譏朋友絶子貢毋輕原憲拙期公鴻雁不空回開緘八行劃如鐵右二十四汗血神駒卓錐耳去似蒼崖决積水據鞍年少笑西征神仙中人梅氏子平生胸抱不由人㸃額再歸曽未嗔儀舌尚存斯足矣卞玉那愁無識真一官聊續箕裘絶登山莫厭芒鞋拙㑹使狗偷掃地無不須蜂蠆揮巨鐵右二十五山頭枯木半生耳山下琉璃剪碧水登山臨水兩超然刻燭千篇對夫子我生也是不羈人白眼望天人共嗔相逢賴有知音鮑揮麈不疑咳唾真子今更與竹林絶我獨凄然守株拙望公聲譽騰九天不惟去作錚錚鐵右二十六别僧永肩號寒啼飢自聒耳火中蓮花那著水超然不復顧塵寰空色兩冥舍利子冠巾賈島齒平人當時僅免退之嗔何如伯升雲水去萬劫不磨一㸃真公今更恐情難絶泛作飛蓬謀未拙挽袖牽裳浩不回當知若人是真鐵右二十七謝楊休人生相值梗萍耳無酒投錢亦飲水况公家世足風流封胡羯末又賢子匹馬來尋物外人坐上無氊寒不嗔傾蓋相逢已如故洗空機械情更真公今在陳糧屢絶惡圓喜方我尢拙窮愁相守兩蕭然富驕何事如意鐵右二十八半夜絲簧紛養耳舞袖香風散沉水髙堂嬉笑坐生春不誦式微驚逰子孟公投轄雖知人故鄉千里兒曹嗔毅然竟把刀頭舞百日夢歸今日真依前瘦馬登髙絶未應却笑此行拙邑人脂膏子弗求况是丘侯帽無鐵右二十九一嵗無多數日耳歸心應逐東流水遙想解鞍在於門滿室生春舞妻子明朝去拜綘帷人遲遲他邦兾勿嗔願及散才求入社寓詩千里寓尋真醫門不與多病絶無鹽自獻那羞拙誰知此質非良全政須乃翁為㸃鐵右三十呈幾叟儀曹管中窺豹一斑耳敢對江海更言水賴公不作揚雄尾舞雩曽許隨童子綈袍至今念故人世人欲殺渠不嗔更將妙語為髙價坐令玉表欲侔真期公終始不相絶回愚參魯余亦拙異時報德但修身那用張良袖中鐵右三十一世上乞憐闕汗流水轅車厠鼠端可憐笑殺物外竒男子先生眼中無可人將軍汚足渠亦嗔倘欲眠時遣客去兩忘物我淵明真世間勢位日懸絶不能變渠平日拙政如强弓五十步無力可貫青唐鐵右三十二嶺雲去天一握耳取死一分天下水不解舟車千里來賴有陳蕃知孺子當堂得酒觴故人醉倒花前夜不嗔我來一見欣如故險語聊攄肺腑真安得眼邉萬事絶與君千首較工拙樂死初無鍤自隨那學祠東墓費鐵右三十三忽忽百年石火耳偃鼠不踰一腹水胡椒百斛何為哉簞瓢便可安顔子君看世間容悅人脅肩搖尾恐人嗔所得僅能毛髮許抵掌無由一笑真期公便與此曹絶折腳鐺中歸養拙冨貴鼎來却應之鄂公未遇姑治鐵右三十四栟櫚集卷六
