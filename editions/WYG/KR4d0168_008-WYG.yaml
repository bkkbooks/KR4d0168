  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0168_WYG_008-1a, image: WYG1133/WYG1133-0295c.png}
body:
  text: 栟櫚集巻八宋鄧肅撰古風送李丞相四路宣撫冷風吹海煙霧開繡衣使者天上来手持天書傳天語促起天下豪傑魁下堂拜命汗如雨上堂鳴鼓旌旄舉要令南國生清風不辭馬上蒸溽暑平生直氣髙蒼穹四海草木聞威風業以自任如伊尹那使流言動周公君臣今日機鋒契六十九州歸重寄屠龍事業警狗偷談笑定縛吳元濟功成上天相都俞指呼瓦皪化華胥日闢農桑三萬里二十四考書中書我今流落窮吞紙蟾蜍爬沙鞭不起歸歟自築茅三間為作野史書雄偉大水雜言前日雨如絲繽紛雜朝霧昨日雨如注萬壑爭馳騖今朝有霽色作意在芒屨那知復如傾漫天飛瀑布介休借車振蒼穹十八葉幡如火紅濤頭起復萬銀屋河伯盡以山為宫門前小艇疾飛鴻挽我同趍急流中人生如夢貴適意乘此可食千頭龍醉中舉杯謝舟子口腹自營吁可鄙不聞大禹不過門血指為䟽九年水何如乘風闕天坐令赤子脱魚腹六合内外連桑田柳枝却下蛟龍約談笑支祁付鐵索異時天上敢驚呼斥作人間鐺折脚次韵王信州煤炱飛上天沉沉三日霧銀河一壓摧狂雨恣横騖我恐鐵騎来疾馳不納屨氣豪如項羽勢猛似黥布瀰漫江河接髙穹石牛未洗血泥紅天吳八首真竒怪咄嗟平地作銀宫我貧家火不星竈赤脚滅沒泥塗中目斷曉風生少女又復茅簷飛白龍慙愧北来王夫子籍籍聲名滿都鄙朝吟千賦暮千詩松腴亦須枯海水莫倚文章似孟堅未用風流追樂天且以光芒破隂晦挽回日色到桑田樂嵗天公有嚴約斥落旄頭沉貫索從公日醉三百杯不怕西風動旗脚再次韵我聞張㣲子仰天能復霧又聞填海神揮鞭石欲騖二子呼不来登山自糾屨雷鼓速雲陣忽忽千岩布誰云九萬隔髙穹玉女笑眼逼人紅銀浦遂傾𤓰蔓水雪浪欲浮天梁宫孤孫得糟時哺翁汎汎浮家烟浪中競呼力士来西域臨江吹縮十丈龍那知夏雨逢甲子身如豬鴨不須鄙赤松作此豈無謀門生主兵渠主水長江正欲截時晝夜亡智伯水如天此功朝成暮可霽便當明月垂青田一雨從今十日約要賡豐年入弦索慿君喚取阿戎俱笑上天門同軟脚鼓腹謡當時大鑊四十石餡鹿如柱餅八尺飽食起来舞金剛揮戈天上駐斜日底事年来到骨窮炙蒲脯苔誑腹空鬬牛一飯期五日一半又聽闍黎鐘啄腐吞腥將日削天公作意殊不惡十圍漸化楊柳輕因馭冷風上寥廓次鼓腹謡元韻我心不轉本非石世路扒沙任退尺杯酒髙懐獨未忘只有三萬六千日原憲雖貧亦非窮石髮溪毛放筋空已遣寸毫飽風月安得髙堂列鼎鐘明朝莫怕山如削夾路花香破酒惡世間得失競雞蟲一笑危岑天地廓戱王子和豪華相陵豆粥石坐上珊瑚碎三尺那知蕭條洙泗間竈火不星連七日我生不復餞文窮醉眼從来四海空一飽便令百憂失三合紅陳等萬鐘君家况有柳枝弱客惡不容主人惡造門果腹姑置之杜陵寒眼慿君廓鼓腹謡謝許令東坡不戀二千石却羡黄州芊經尺一飽何妨作許難千古光芒買白日我生不暇哭途窮入户青錢轉手空肉食不容久青瑣齒牢但可叩天鐘許侯詩成謝斵削飛流来洗徐凝惡開緘百里已生春九州更頼此心廓風雨損荔子前日雨聲如隕石昨日風狂退六鷁荔子吐華漫如雲結實定知無十一南来無以慰愁煎端期一飽果中仙山頭看花日千轉黙想香味空流涎事類翻羮慎勿恤風雨在天非人力要及豐年天下同那為海邦私一物題吹衣亭馬上衣衫涴塵土斂板權門腰傴僂冷風天上呼不来厚顔如甲汗如雨星郎髙韵凌雲烟天頼喚歸酌流泉人間熱惱醺不到亭上鶴衣飄欲仙君方醉樂人愁絶何如御此登天闕叩天借此衣上風吹下九州作春色逰鼓山蘭橈艤岸雷霆駭闕海吾人作意水石間素志豈因風雨闕衡山不知為開雲魯陽莫試揮戈手郭寨何妨整角巾山僧道我飛芒屨要看渠師得道處雪噴鼎烹一斥迴千古澗流不東注我笑老師太豪雄故令鬼物窺吾踪安得廓然無聖解蒼厓依舊飛白龍别珠公我頃詩成准勅惡寒江夜度秋蕭索曳杖從師得摩尼洗空愁膓天地廓年来狂妄嬰逆鱗去國三秋又出奔隔牆後得綈袍舊一笑喚回逆旅春我心不轉嗟匪石方壯兩遭天上斥處處逢君道價髙萬指方袍趍法席白雲天下妙林泉看君又作新法縁倘能容此無歸客便當結社追白蓮送許丈赴行在天狗夜吠夷門月乾坤易位人泣血那知千官舞蹈迴馬上洋洋靣不熱許侯逆風敢孤鶱黄金圍腰挽不前吾君已立閏位退再拜丹墀吾節全我時上天恣狂直權臣舌端飛霹靂當時陷穽皆交逰侯獨臨存真鐵石此来邂逅一笑間夜傾閩酒赤如丹胸中磊塊澆未下征斾忿忿又吳山山前鮫鱷翻平陸殺人如麻未充腹慿君仗劍追祖風坐令四海桑田復栟櫚集巻八
