body:
  text: 栟櫚集巻十九宋鄧肅撰題跋題了翁墨跡顔魯公忠義之氣充塞宇宙故散落毫楮間者皆銅筋鐵骨使人望之凜然不寒而慄顧其規規從事墨池筆冢而至於斯乎觀了翁作宇便知其與魯公同科蓋其胸中所蘊有黙契者亦非可以間架求也夢得寶此豈偶然哉建炎四年十二月初十日鄧某書於杉口書樂天事王涯讒樂天出為江州司馬及甘露之禍朝士殆無遺者而樂天方在洛中遊香山寺然則涯果能陷樂天否乎小人無知欲以人勝天類皆如此但可憐耳書揚雄事屈原伍子胥晁錯皆死國之士不當更訾之蓋事君以忠為主才智不足論也揚雄一切譏之謂非智者之事是知揚雄胸中所蘊欲作美新之書久矣豈迫於不得巳而後為乎迨莽以符命捕劉棻甄豐等雄自投閣班固便謂棻嘗從雄學故雄不得不懼殊不知美新符命一體也莽既怒符命則亦美新何有乎雄身為叛臣無所容於天地之間故忿然捐軀期速死耳此揚雄之徒所謂智也書字學莊周以短後之衣為趙王説劒孟軻與齊王語乃論好色好貨二公之論雖主於正然其始也别之以所好及其終也乃極之以所不可為無乃類於蘓秦張儀之掉舌乎曰戰國以縱横之説為勝其來久矣卒然以大中至正之道陳於前彼且驚駭而不能安吾説亦何自而入乎借蘓秦張儀之辯以論周公孔子之道此君子之術也熙豐以來專用王安石字學士夫師之不敢誰何蓋寧以孔聖為誤耳端不敢以鄭服為非也蘓東坡猶切齒時於文字中以兒戲玩之今觀其論八佾則考説文曰從人從䏌了齋先生極論新法不便且著尊堯集鄙視安石不啻奴隷等及作書於曹子宣乃論悔字從心從每觀二公之論又若未能忘字學者或者疑之予曰莊周孟軻之意也或者曰然題鳳池寺漕使陳汝作邀西清黄堯翁議郎張泰定延平外史鄧志宏同遊鳳池寺禪房花木幽香襲人泉石琮琤共鳴環珮方兵戈初定之際享此勝景以侑一樽豈易得哉紹興二年三月丙午題賢沙寺莆田陳汝作邀三山黄堯翁毗陵張泰定延平鄧志宏晩集賢沙寺宿雨初霽景物一新遂獲縱觀飛山之勝豈衡山之雲特為退之一開乎僉曰當誌之紹興二年三月丙午題開平院栟櫚鄧某志宏遊此勝景超然固非塵俗鄙而住持材成之新詩健筆氣欲凌雲清談終日了不及世事也白蓮結社當在異日率俗而行惘然作惡宣和癸卯八月五日誌之題潺湲閣七峯鄧駕道陳若䝉鄧志宏伏自塵寰中縱步得此茂林危閣泉石相激凜然寒風箕踞露頂論出世法積後二日而歸天上廣寒宫未可知人間決無此景也書法帖羲之書妙絶今古横斜顚倒各有竒態如雲煙變化自出天然非人力可至也蘓東坡謂魯公書奄有晉宋以來風流吾恐魯公政得羲之緒餘耳且力學而至者非其天也自生民以來一羲之而巳李太白以虞禇為書奴余初過之後因臨虞書者數日繩繩然如在樊檻中忽見王筆俊逸如此便覺紙上有騎氣馭風之興然後知太白之言端不妄也跋李舍人放鱟文夏四月巳卯侍舍人李公遊於隱圃公以放鱟之事語某聞而異之乃請曰幸先生書焉以為衆生福田公不可曰夢寐之事未暇也明日造門復請曰南海之民恃魚為命殘鱟而食者歲以萬計未聞有以夢告者今獨於先生而祈焉不書之何以聳見聞而助教化公乃惻焉為之揮毫叙其殘殺之害為甚酷考其口腹之適為甚微使見之者皆若親感其夢而視血氣之類皆為鱟也則凡有惻隱之心者其誰忍殺之愛物之仁固不可量數又豈止一鱟而已耶昔人嘗謂螺蚌蜆蛤之類賦性不全殺之無害蘓子有言此乃懦陋頑固衆生不能自訴報怨者若殺之正是欺善怕惡夫鱟之為物介重遲潛逃深渺豈亦賦性不足者之類乎今且能感夢如此則又烏知其不能自訴耶是亦可畏哉此某所以請公之書而願為刋之且道其所念闕門人鄧某跋陳了翁諫議書邵堯夫誡子文此邵堯夫先生之文了齋先生陳公書之無甚高不可企及之事皆中庸之道也但智者忽之若不足為愚者棄之而不能學此邵陳二公所以不能默默且有望於賢子孫也昔韓愈氏示符古風用玉帶金魚之説以激之愛子之情則至矣而導子之志則陋也方以邵陳過庭之訓無乃相萬乎惟識者察之跋朱喬年所跋王安石字自荆舒祖桑𢎞羊以竭山海之利故世無飽食之農師秦商鞅以推不可行之法故祖宗無可畱之典尊揚雄以贊美新之書故學者甘為異姓之臣予讀其書不能終篇況學其字乎朱喬年學道於西洛學文於元祐而能喜荆舒之文與其書如此殆所謂惡而知其善者歟建炎三年閏月庚辰栟櫚老農栟櫚集巻十九
