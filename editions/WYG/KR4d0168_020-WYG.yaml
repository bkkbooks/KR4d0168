body:
  text: 栟櫚集巻二十宋鄧肅撰題跋題了翁眞蹟龔公陟升叟以忠義敦遣於郡攜其妻舅了翁眞蹟以過余曰幸子跋之開巻凜然銅筋鐵骨洗空千古側媚之態蓋魯公之後一人而巳升叟勉之學其書者豈在點畫之間乎無充宇宙之氣者必不能斥蔡京於崇寧間不能斥蔡京者決不能作是書也升叟勉之跋蔡君謨書觀蔡襄之書如讀歐陽修之文端嚴而不刻溫厚而不犯太平之氣鬱然見於毫楮間當時朝廷之盛蓋可想而知也自崇寧以來以文章字畫為天下主盟者較之仁廟之時賢否如何人才盛衰信乎其可卜治亂也事至今日但可慟哭耳建炎三年已酉跋李丞相贈鄧成材判官詩建炎三年冬十一月金冦破洪傳檄下建昌當時無敢誰何者判官鄧柞獨不可曰寧死耳忍負吾君父乎拂袖而去誓不降辱南奔閩山斥還僕御脱身萬死而臣子之節立矣大丞相李公聞而壯之因鄧有詩遂次其韻既贊其所已至又勉其所當為鏘金戛玉鏗然廊廟之音蓋道德之妙形於言詠非止以句法高天下耳鄧子之學其光矣乎宣和間鄧子嘗以諸生從公遊於沙陽得其議論之餘遂能所立如此今公相期益厚又非前日比他時設施當如何哉因讀公詩謹題其後蓋非特勉子耳亦自警云時紹興元年四月晦跋羅右文李左史題栖雲眞戒大師營治沙縣佛宫殆以百計獨無輪藏以聳觀者栖雲禪院眞戒大師可臣首造之金碧相照恍若天宫蓋閩中所未有也又以謂傳公之建藏三藏之傳經皆唱吾道者因架閣以報之又立堂於殿下以招具眼人同觀藏教白石清泉之間明窗净几如在世外右文羅公見曰此老當為吾邦之傑然者歎賞久之乃紀以詩而左史李公亦曰豈特此邦耶雖求之天下指不多屈遂次其韻亦以贈焉且二公平日為吾道主盟近年以來義不辱於金張賈馬之門寧居冷宦聊以卒歲耳決非假人以言者孟子曰觀逺臣以其所主觀近臣以其所為主不知眞戒者但觀其所主則其人可知矣跋虞中郎畫韓退之作畫記闕句法中自有丹青至今開巻熟讀如見畫焉蓋文字竒偉至此又一變也竹溪先生虞仲子今記有晉司空鹵簿於丹青外更考一代制度至於論君父錫予之盛以報人臣勲業之隆上下泰然不相疑貳吾知仲子筆力不惟畫師作耳茂先德望晉室第一流嘗鷦鷯自喻若無志於九萬里者顧豈眷此車馬赫奕胥徒煩盛區區使愚夫愚婦驚詫咨嗟於瞬息間遂忘其身至不得終於牖下且禍及其三族乎蓋以身許國者不顧其私死生存亡一切任之耳倘不如是則海島既至台星中折茂先巳翻然為竹林遊矣寧至如是耶仲子職在道山而以洞霄自隱其視世間榮辱得喪為何等物一見茂先鹵簿乃愛之篤考之詳贊之美如此蓋所羨於茂先者在此而不在彼也惟有識者辨之跋鄧右文天池記天池有二其一在天上乗風而至九萬里其一在廬阜飛錫而西凡十有七舍余毎恨其逺若不可數數者今又得一焉即沙縣所謂洞天岩者是也岩在梅岑百尺之上居者以開水為急吾見右文葬其母氏於岩隈欲作大佛事忽一念間得一泉甘泠可給數百人故等慈顯老以天池目之余族叔德稱又考古援今為作記文吾出吾廬西望縱歩可至一日雖五七返不見衰憊是太虚間有三天池吾乃占其一時供勝賞豈不謂閑居之幸乎或曰正恐大小高卑不可同日而語余曰噫曹溪一滴與四海同體大小高卑何足論乎乗風而行天上者羽人也飛錫而走廬阜者釋子也羽人釋子安知其不欽吾右文之孝慕顯老之禪而喜德稱之文章一日偕來乎姑俟之跋樂氏偕來堂記韓愈氏倔强豪邁疑若空視世間軒冕若無足介意者至玉帶金魚或叩其門則形於詩筆以誇示兒輩蓋貴貴尊賢其義一也君子其可忽諸唐輔粹夫為樂氏二難卜居深杳蓋將追友逸民若不數數於趨走者前達君子舉叩其門或作一再款樂氏喜之作堂以名偕來所以志之也然則好賢樂善之心端不愧退之矣鄉人之彦者作詩以贈焉是可以賦也余罪逐逺闕聞樂氏之風恨未能至舍弟晝攜其詩軸乞余跋語於是乎書跋文恭公墓誌安定文恭公執政日力修盟好重興兵革當時貪功生事者往往未必以為然至宣和間邊隙一開海内鼎沸二聖播遷逺在沙漠而天下横屍當以億兆計然後知前輩愛主憂民之心為天下後世之慮非世間薄夫淺子所能窺測也九原巳矣不可復作而天下之患有不可勝言者伏讀誌文謹慟哭以書之紹興二年春正月庚申跋胡公墓誌蔡京當國二十餘年天下世人舉遊其門間有不為京所汚者非才術智識不足以悦京則其所疎逺不能與京接也夫初以不才為京所棄今乃洋洋謂非京黨不亦欺天乎了翁誌胡公墓有曰帥在政府者蓋斥京也公為京所知如此卒不為京用豈非人傑哉諸子於政和間敢犯時怒力求翁文以誌先德亦下視京輩如草芥耳今也節義文章皆卓然出人數等蓋淵源渟蓄有自來也嗚呼盛哉題稱老開堂疏稱老挂錫延平廣教禪悦之餘閉户讀書時出好語使君太博莊公聞而喜之令居天王為製疏文有神珠法雨之語可謂知禮者語今領衆肅然日傳此道清譽四播如走風雷亦可謂不負使君所知矣德公之賜欲刋其疏且求某跋之余以謂欲報其德者不必刋其文然非託於文則無以志吾之知遇也於是乎書靖康改元四月巳未栟櫚某書栟櫚集巻二十
