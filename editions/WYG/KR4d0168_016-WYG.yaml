body:
  text: 栟櫚集巻十六宋鄧肅撰記沙陽重修縣學余嘗怪道釋之居雄麗相勝而州縣之學類不足以方之顧其無自而然哉蓋人心役役不有所貪則必有所懼未嘗有斯須寧者道家者流曰我能薦人於天可以幾福於式外故貪者慕之釋氏者流曰我能福人於九泉之下雖造業深重者鬼亦不得以誅之故凡有罪者懼焉貪者利其如此而懼者惟恐其不我利也此道釋之宫所以輪奐竒勝殆遍天下非學宫比崇寧以來蔡京為冢宰羣天下學者納之黌舍校其文藝等為三品飲食之給因而有差旌别人才止付於魚肉銖兩間學者不以為羞且逐逐然貪之曰吾利在是不可一日捨是而他也縣有帥長郡有教授未必知有所謂學校之本者但務為美觀耳帥使者又從而督之以學宫成壞為州縣殿最斥叱所及官吏膽落故士夫懼焉此崇寧間學舍之盛所以妙絶今古可以無愧於道釋之宫也嗚呼學校之興雖自崇寧而學校之廢政由崇寧何以言之蓋設教之意專以禄養為重輕則學校之士豈復顧義哉知有利心而已一旦赫然復祖宗法以科舉取士學者則曰朝廷不以學校觀我矣吾何貪焉州縣則曰部使者不以學校督我矣吾何懼焉是故昔日青衿接迹絃歌之地今則敗椽老屋號風泣露使人過之凄凄然如墟墓間若不可以復振者是眞可傷哉南劒有邑曰沙縣溪山之勝文物之盛蓋甲於一郡其在閩中亦號為卓卓然者舍法既罷學校亦廢仰雨傍風儒生掃迹宣和七年建安郭侯得邑於此惻然作念曰此邦亦復如是耶舍法可罷學校不可罷置而勿顧非為邦之本也於是邦人之彦者率侯之語各竭力以營之朝夕勉勉若切其身曾未踰時講者有堂居者有舍奉先聖者有殿齋宫祭具無不備器棟宇凌空朱碧相照又有非崇寧間所能及者於是學者偕來啾啾誾誾有洙泗之風嗚呼盛哉古無有也殆不知大夫與邦人之彦者懼使者之督而肯為之乎抑貪夫所謂三舍之選而為之耶内無所貪外無所懼上下相率必於有成果何謂哉一言以蔽之曰誠心而巳矣然則郭侯之志與邦人之彦者豈不既賢矣乎余於建炎之初論事謫自左掖因以冷居里閈蓋將束書負琴日造庠序以為廢事之愆侯乃以記文見屬余曰唯此僕所願附姓名者敢不書雖然學宫之弊今巳新之寒暑相易風雨摧剥異時能保其不弊耶侯文章事業靄聞於時牛刀割雞豈久畱此弊而復新其在邦人之誠心乎且誠之為道大矣天地可動也金石可革也惟出於至誠則有確乎其不可易者顧其勤於今日而怠於後日者乎異時郭公持節以過舊部若見學宫不減今日然後知至誠之道可亘千古非貪與懼者之比也故余併書之以告來者具瞻堂大丞相李公宣和初以左史論時事之失謫監沙邑筦庫朞年而罷宣和末以奉常還朝與決大計遂參左轄敵騎迫城公以身蔽之敵退遷元樞未幾而出敵騎再至則汴都不守矣今上即位之初走使召公再遷為左僕射紀律稍正羣盜向息而公又逐不數月間翠華有維揚之幸故天下識與不識皆謂公之出入係朝廷重輕非近世名臣所可比也東坡曰兒童誦君實走卒知司馬吾今於公復見之矣新安吕子之望以智謀中科得官九品筮仕之初襲公筦庫之職一日居其堂而四顧曰此非大丞相李公之所憩乎平日仰公如太山北斗今以職事繼公後塵其瞻仰之誠參前倚衡如見公於上雖食息謦欬之頃不敢輒忘請新其堂而榜之曰具瞻所以致僕拳拳之誠且與後來有知者共之堂成予即造焉雖喜吕子趨向不凡且為吕子危之李公直氣充塞天壤不能一日安其身於朝廷之上當時願畱之者殆以萬計幾坑於奸佞之手有抗章以挽之者皆斥竄流離去朝廷數千里者至於梟首通衢以竦天下吕子何恃而敢如此予竊為吕子危之因以告之曰前日死諫之士今此去國之臣皆子從遊之舊當時議論子無不以者朝廷大臣蓋巳切齒但未有以發之耳故去年省試子雖優擢有司觀望吹毛求疵竟不復廷對今不省愆易慮默默安職復爾作為是自貽咎耳後悔其將追乎吕子曰諾坐此獲罪芬芳多矣謹俟之建炎三年二月二十一日記某不善作眞字記成而不能書畏禍患者又不肯書建安張博見而喜曰李公之德卓卓如許豈獨吕子願遊其門哉僕請書之禍福之來吾弗計也噫世間惟不計禍福者方可與論出處某今又何幸而得與二子同遊乎後五日某題亦驥軒余謫自左掖逺歸里閈志中出郭西十餘里迓余於高砂郵亭再拜而起曰兄以言事召復以言事出職也脱身敵營驅馳萬里遂得以拜親闈幸也謹以賀復再拜予喜其言似有所見者豈三二年間學問自進耶吁可喜也志中相别聞嗜酒喜遊浮沈里巷中似未能自克者至於好賢樂善之心則不啻若飢渴然予固嘗逺期之今日聞見果非故吾是不負余所期也推是心以往則亦何所不至哉志中乃歸治其室環列今古閉户靜坐雖居陋巷而享簞瓢泰如也予過之而字其軒曰亦驥軒且語之曰晞驥之馬亦驥之乗晞顏之人亦顏之徒此揚雄氏之言也囘之道非常闕然者雄以驥比之豈稱其德而不稱其力歟且夫氣逸神駿蔑視燕越長鳴就道箭激電飛此驥之力也至於俛首羈韁以安服御載上之勤夷險不變此非以其德歟囘在洙泗之間以言語則不如宰我子貢以政事則不如冉有子路以文學則不如子游子夏其所以卓然冠於三子之徒而居四科之首者蓋在此而不在彼也志中有志於若人乎即此晞之是知本矣雖然晞驥可能也而亦驥不可能也晞驥云者特有志焉而巳至於亦驥則巳行其所至與之齊驅並駕殆有不可得而優劣者余所以命軒之名者大矣予所以期志中者高且逺矣志中其勉之異日無愧於此軒之名斯無愧於乃兄若無愧於乃兄則步驂齊驅殆未可以今日量也㑹有伯樂為子一顧豈久困鹽車者哉志中其勉之志中名晝於予為弟云儀鄭堂延陵呉方慶踵栟櫚鄧肅之門以告曰余先君刑曹與夫子先庭為短檠之舊少年同薦於鄉晩得官九品復同等余於夫子頃在庠序為莫逆之交今以姻屬奕棊賦詩無頃刻相捨予之貧又與夫子等夫子其知我也深且舊矣余先君子頃視死生之變不入其舍嘗穴土為墳曰吾死即埋此今既不幸捐館舍室家所有租給襄事作堂墓側以致歲時之思巻曲散才僅除風雨丹雘之飾皆屏棄弗用從治命也或過曰嘻陋矣哉或曰嘻其亦儉於其親哉夫子視我果貧乎果儉於其親乎先君子果安於此耶其亦弗安耶肅對曰余雖未獲拜刑曹君於堂下然嘗聞吾先君子云語曰禮與其奢也寧儉喪與其易也寧戚今人不務為孔子之所為而送終之禮且欲過之殊不知孔子之道卒不可過也以奢易儉以易易戚是終與孔子背馳矣學孔子之道而與之背馳豈知學者小子其志之今以先君子之言以卜其友之志當無二道也然則刑曹君其安於此也審矣君之戚君之儉當無愧於前輩矣夫不儉於戚而儉於言奉之末又其力無以為奢焉以克成先君子之志其過於流俗也亦逺矣昔杜預過邢山見有冢焉問耕父云鄭大夫祭仲或云子産之墓也遂率從者祭而觀之其隧道不至其前示無所藏所用之石不取美者而取諸洧水示不勞工巧而石不可用於世也預將相土而為容棺之室儀制取法於鄭大夫欲以儉自全耳杜預之賢民至於今稱之弗釋也刑曹君之志其杜預乎君當成之可也呉子於是戄然而起曰余嘗名其堂曰儀鄭堂其言偶於呉子合豈呉子之貧然後知余之貧乎抑家世學問初無殊論乎夫子其為我記其語可也余曰唯唯雖然晉室未振呉氏方强當時羣臣縮首以顧妻孥無一人為其主闢之惟預與張華等潛知主意赫然振師干戈南揮卵破草折坐今勳業與日月爭輝余嘗謂預其營葬雖以鄭為則其左右晉室則以周召為則也先刑曹嘗則其下葬矣其所以則周召者實付後人呉子才學卓卓為一時望律身持志堅於金石又掇科名以居仕版時適今日眞有為也當有大於晉室者夫子其勉之異日當為子大書勳業立為二碑以修邢山洧水故事蓋不特作是記而巳矣夫子其勉之栟櫚集巻十六
