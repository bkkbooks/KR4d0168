  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0168_WYG_007-1a, image: WYG1133/WYG1133-0291c.png}
body:
  text: 栟櫚集巻七宋鄧肅撰古風劉忠顯挽詞靖康之變死其事者數人然皆人死之耳獨忠顯劉公勲業聲譽著於兩河敵乞於朝盖將用之公獨不顧毅然自盡此所以卓然拔乎其萃為當今第一人也某以布衣辱公父子兄弟待以國士頃嘗論公之節如顔真卿杲卿等或者駭之曰公尚亡恙子安得出此語乎忽忽十年而公竟以節聞更出顔公之右識者然後知某前日之言自管見盖非偶然耳公喪南歸義當匍匐一慟新阡之下但方以罪逐不欲徹聲於賢公卿之門今仲固馳書索詩以助挽人之唱某敢不勉然我公氣義欲穿天心金人雖有萬衆不得以兵甲威之今欲寫於毫楮間顧豈區區章句數字得以縛之乎謹作古詩一首略去聲律意盖有在也伏幸采攬城頭皂幟作雲飛城中不縱征馬嘶虎狼那顧百萬衆政期生載人傑歸天王遣公如召虎諸蕃列拜聽竒語軍中相慶得左車闕混天宇先生一笑凛長虹此膝那屈闕忠如魯公毡帳歸来眦欲裂北極紫㣲汪洋血更欲結草報君王夜半無人徑自絶城門初開聞訃書參騫往哭萬人俱義色忠軀略不變忠言凛凛在襟裾當時中國滿朱紫不臣女真即臣楚聞公髙節端不回身雖無恙氣先死英風吹到新冕旒天恩夜破九泉幽佳城可葬不可沒時有紅光上斗牛我昔從公子弟列欲報公知効公節公騎箕尾我誰依獨上山巔采薇蕨寄德裕縣丞世人齪齪例卑嘶搶榆不識南㝠飛邂逅逢公能可意笑呼文舉作羣兒扁舟十日繫楊柳未忍憤然誇疾走官長雖嗔渠不聞且覔吾徒縱詩酒笑談便覺無樊籠勝景况復煩天公眼前突兀萬銀屋河伯欲以山為宫期公定非噲等伍愛公髙氣塞寰宇此行要須上九天利磨干將斬張禹再韵明復和来男兒匹馬追風嘶朝燕暮越去如飛談笑功名在鐘鼎卵破草折驅健兒悲吟誤學愚溪柳落筆幸無龍蛇走詩成不直水一杯誰解金龜與換酒能言嗟我閉雕籠九萬扶揺政屬公好震雷威養霖雨要須磨賦未央宫逰戱詩壇整部伍筆鋒光怪横天宇畏法請歌七月篇惡食卑宫賛神禹口占白鶴一去斷消息白鶴嶺髙髙無極仙人望汝久不歸珠花撩亂瑶海碧當時同伴有飛鸞雪浪掀天翻綵翼世間千嵗㑹重来過眼不須尋鳥跡送李君上洞天北風于喁萬竅號落雪紛紛燖鵠毛好向髙堂䕶帷幙新醪入臉殷春桃居上何為囂不顧叩尺長歌辭我去行行逸興髙白雲千里江山入芒屨問君無乃急所求笑指南安作勝逰南安老師初不死一聞消息即歸休嗟我平生汚詩酒未能赤脚走岩竇在家自得忘家禪託問老師印可否戯天啟作時文君不見晉陽作垣期自固中藏荻蒿勁箘簵知音㑹遇張孟談安趙有才終一顧人生㑹遇自有時兩股何須欲置錐快將好景供詩酒嗟嗟戚戚非男兒哭施叔异天上樓成求俊闕那知施侯更可憐只向人間闕横秋豈惟落筆動驚俗政事入眼無全牛汗血共艱千里足狂風忽已摧秀木生前萬事且置之白頭老母將焉屬管鮑交情我最深訃来一慟幾失音相思通昔不作夢對床蟋蟀更秋吟招成老萬竅于喁北風烈烏雲貼地欲飛雪醉乘一葉上玻璃忽霽隂威行夜月鳳凰山頭想大顛芒鞋竹杖弄清泉胸中得句自春色散入草木騰雲煙安得今宵對揮麈快然别作二嵗語遥知今吾非故吾便當刻燭追風雨送成材伯夷自甘首陽蕨商臣不戴周日月那知世人冷笑渠却言馮道有全節紛紛過眼萬飛蚊何如閉目日飲醇議論不從流俗變吾宗頼有謫仙人謫仙品流居第一射策王庭恣狂直不知天上聞不聞且説奸臣俱辟易秋風鞭馬衫挼藍一官聊渡試江南羣從相從得髯尹家學須當與劇談江南風月歸詩酒二陸相從真得友無人肯伴栟櫚狂為我喚回脱帽張避賊引羽檄星馳暴客起西望烟烽無百里夜半驚呼得漁舠老稚相携三百指蠖屈蛇盤破蓬底忽欲騫身風刮耳沙汀艤岸少依劉萬斛愁情空一洗迴思當年侍玉皇禁垣夜直宫漏長驅馳誰謂遽如許客枕不安雲水鄉前日蹇驢衝火烈今此扁舟􅐦殘雪隆暑祁寒欲少休鉦鼓逼人如地裂草廬安得無卧龍奉天政頼陸宣公慿誰急呼人傑起使我叩角歌堯風次韵師臯平生論兵輕白起端欲採芝追冉里誰遣聲名到人間役役十年空血指天狗墮地嗟未已雷聲屢迫君王耳閩山今復暗旌旗四望長安淚如洗羡君好古慕羲皇品流不減劉真長舍我帡幪得甘寢傍徨忽在無何鄉安得當陽如火烈坐令此軰消春雪六合内外還桑田乾坤不容異姓裂㸔君躍馬如逰龍醉中脱帽造王公髙堂請志中興事吉甫作頌穆清風聚星行昴星下天扶漢德長庚乃向開元謫光芒相照數百年一尊不得聞風月何如今日出城闉髙堂共享無邉春風流皆右煙霞表不數當年荀與陳江湖我今方巻舌君等上天環北極箕斗虛名不必多要斥旄頭作頑石寄李狀元渡頭送君泛小舟絲絲細雨織寒愁自聞君来天亦喜急掃隂霾霽九州聚星髙㑹古難續也欲從君勤秉燭期君指顧蘇甌閩一笑春風不忍獨送張巨源我頃天上遭雷斥萬里歸来弄泉石慙愧張侯著眼看詩巻光芒射奎壁一朝逸氣見眉間浩歌依劉出閩山渠今得客君得主寧復回首更悲酸隂雨初生腐草翼破闇行空夜的皪何時歸伴栟櫚狂一吐長虹貫白日送吕友善火雲燒空汗如雨江北江南俱豺虎君侯不顧磎山幽鞭馬一朝去莫禦挽君少竢秋風清君言倚門有雙親千里歸来綵衣舞死生不計萬鍾輕過眼紛紛青與紫顛倒重輕真可鄙慿君上天整乾坤自古忠臣多孝子黄楊岩石壁巉岩驚鬼劃異草幽花鎖春色羣山迤邐不能髙突兀獨磨霄漢碧芒鞋千尺上崔嵬手摘星辰脚底雷撥破烟雲得洞户醉眼恐是天門開入門嵯峨在紫玉天風吹靣天香馥華裾闕醪揮麈尾萬指未充空洞腹我因避地訪名山扁舟夜渡沙溪寒辛勤博此一笑喜太平猶在水雲間猛將今無三角虎狐狸晝號鰍鱔舞靈岩知有老龍藏挽出人間作霖雨雹黒雲壓山山欲頽阿香推車振不開廣寒宫中珠徑寸狂風傾下九天来髙堂砰轟倒四壁萬瓦飛空如轉石燈火青熒不敢明世間誰有胆三尺年来蠢動敢爭豪鰍鱔起舞狐狸嘷一振天威百怪息夜半雲收北極髙栟櫚集巻七
