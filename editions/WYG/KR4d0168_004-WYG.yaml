body:
  text: 栟櫚集巻四宋鄧肅撰古風靖康迎駕行健児作意厭人肝揮鞭直視無長安南渡黄河如履地東有太行不能山帝城周遭八十里二十萬兵氣裂眦旌旗城上亂雲煙腰間寳劍凝秋水雪花一日故濛濛皂幟登城吹黒風我師舉頭不敢視脫兎放豚一埽空夜起火光迷鳳闕鉦鼓砰轟地欲裂斯民嗸嗸將焉之相顧無言惟泣血僕射何公叩龍墀圍閉相臣臣噬臍竒兵化作乞和使誓捐一死生羣黎逰談似霽大帥怒九鼎如山疑復顧郊南期税上皇輿截破黃流徑歸去陛下仁孝有虞均忍令征騎聳吾親不龜太史自鞭馬一出喚回社稷春敵人慕得猶貪利千乘載金未滿意釵鈿那為六宫留大索民居幾巻地六龍再為蒼生出身磨虎牙恬不恤重城突兀萬騎屯杳隔鑾輿今十日南門赤子日駢闐爭掬香膏自頂然忿氣為雲淚為雨漫漫白晝無青天太王事狄空金帛坐使卜年踰八百天聽端在民心耳蒼蒼誰云九萬隔㑹看春風擁赭黄萬民歌呼喜欲狂天雨無塵瞻北極旄頭落地化頑石寄司録朝奉兼簡伯夀老松古栢爭清勁社稷元勲李文正風流千古照人寒家有白眉聲益振十年逰宦落窮山妾無衣帛日號寒只餘净業磨不去駸駸筆勢江湖寛阿戎作詩更難偶銀鈎仍復規顔柳蒼藤千尺練敲氷萬軸晶瑩照窓牖明月夜光兩相酧束笥堆床曽不休公家自有嘔心戒豈容雕琢損天逰嗟我無文出月脇惟有蓬窗堆柿葉如何分我三百萬試掃危言助調燮道原惠茗以長句報謝太丘官清百物無青衫半作蕉葉枯尚念故人家四壁郝原春雪隨雙魚榴火雨餘烘滿院宿酒攻人劇刀箭李白起觀仙人掌盧仝欣覩諫議靣瓶笙已作魚眼從楊花傍念輕隨風擊拂共看三昧手白雲洞中騰玉龍堆胸磊塊一澆散乘風便欲欵天漢却憐世士不偕来為借干將誅趙賛大雨夜夜隂雲如潑墨雨勢欲挽銀河竭春工十八落泥塗驟雨誰云不終日魏紫姚黄業已空嬉逰何足介心胸只恐年年禾黍地浸滛盡入陽侯宫慿誰為我呼少女掃空隂翳開天宇光風霽日暖層霄坐令六合同歌舞芙蓉軒我開幽軒榜芙蓉琉璃十頃浸新紅此来踏雪空無有黄蘆敗葦爭號風却坐明窓弄書史新詞仍試佳毫楮香風忽到簾幙開一朶芙蓉却能語我生眼中萬妖嬈為渠還作夢渠勞炙牛未數劉師命驂鸞便學王子喬賀朱喬年生日三春一半入羣芳朱朱白白競天香人間無處著此景付與長庚作肺腸長庚乘風下天宇明窓萬巻飽今古筆端著處皆春容文墨林中三角虎祗今聲價髙雲煙要轍故應嵗九遷便當折檻追家世與國同休億萬年謝虞守送酒瑟瑟嚴風鼔蓬户對話春圍兩亡趣使君送酒喚春来坐使漫空翻柳絮雪榭懸知雪未消一目千里皆瓊瑶詩仙冷坐清入骨便合九萬摶扶揺迴首故園歸未得天意留人亦竒絶我今幸得賢主人公亦未易有此客别虞守閩山去天惟尺五傍立怪石如蹲虎㸃額龍墀萬里歸未能赤脚走風雨慙愧使君肯相延十日傾酒如流泉文字興餘亦不惡紅粧執約艶神仙明日馮驩出有車逺借仁風歸故廬不用回頭重引領行矣商霖到海隅昭祖送韓文兩鳥相酬不肯休欲令日月無旋輈斯文未喪得韓子掃滅隂霾霽九州古来散文與詩律二手方圎不兼筆獨渠星斗列心胸散落毫端俱第一陋巷嗟余四壁空惡本雕殘付蠧蟲雖得一斑時可意魚魯紛紛意莫窮好古誰似城南杜平生不矜潤屋富力刊善本妙毫釐日費千金曽不顧老藤截玉奴側理千古松煤騰碧烟入手五行俱可下兀兀短檠忘夜眠我生嗜好隨時改獨有此書心不解欲酧厚意錐也無更為先生作阿買偶成乘風上天欵天語天公不怒雷公怒烟霄一斥下人間敵兵旁午歸無路欲度三吳血盈川欲泛九江兵闇天扶筇却出徽城去去天一握五危巔水陸辛勤已足矣雪花更開九萬里英雄困餓古猶今莫學兒曹生愠喜題顯親庵謹次嚴韵寒蘆敗葦秋風嚴魏紫姚黄春色妍誰能不隨天地轉開闔自我古無前秋花忽從三月盛引得好詩来相慶為見漫空兒女姿義氣稍回君子正我頃失魚縁釣直抱璞未酧不須泣天生我輩豈偶然但驅百怪歸篇什慙愧梅仙情最親期我看花三省身已越春風聊一笑更倣秋霜不改春送思道福唐狂風一過天如洗四巻隂雲空萬里髙樓月色三更寒漁歌相應起寒葦一樽初對謫仙人只用瀾飜細論文半夜拂衣翩欲往飄飄逸興凌秋雲破浪扁舟一葉細問君去去端君意笑言演峽隘心胸要觀閩海浩無際顧我虀鹽尚泮宫安得化雲便從龍好景欲觀今未遂慿君驅入錦囊中與郭舜欽朝請成均冷坐窮吞紙額叩龍墀濵九死背負琴書偶生還頼有春風滿故里故里𣺌居天一隅因仍蔓草不堪除多謝先生肯逰刃號令雷霆一掃驅舊弊忽消新慶長老稚相携紛闕坐使牛蹄一畝中九萬共摶羊角上只恐朝廷急英雄割雞不用煩屠龍政須太山来􅐦卵金闕喚回小令公陋巷嗟余空四壁餓死平生無枉尺知音今有昌黎公玊川得卧三竿日遣興醉中飛夢到神清夜半髙樓借水明下瞰寒溪凝水晶孺子相呼同濯纓樓上天人百寳瓔瑞色天香充棟楹歩雲一曲語春鶯千山洗空烟霧横酒醒簾外竹隂行夜風更為芭蕉生愁腸起向謫仙呈夢境慿君指顧成一開後堂花柳盈香肌可邁六出霙珮玉步蓮不自輕寒眼那能更指令春葱斜捧玉壺傾真珠紅滴濃無聲一醉花間豈易營歸来十日寸心縈蘭亭家風類帝京為余亦復出花城柳腰隨風萬里征鞍馬不復數歸程坐令鐵心宋廣平夜揩醉眼賞梅英歌燕舞趙藝更精遏雲迴雪未可評人間不復數娥㜲神仙逰戯肉眼驚我生不顧萬鍾榮對花有酒即蓬瀛髙㑹何須四者并赤脚亦能寫髙情最恨蘇公世公卿家聲往往九州傾風流陣中却寢兵酒甌但借鄰姬擎何日髙樓鐘鼓鳴如我心醉如春醒題天慶觀真人躡身凌紫霞下憫濁世長咨嗟崇樓傑閣耀金碧開闡至道非雄夸仙茅連山可度世守此規規如井蛙靈雲一笑萬事畢到今福地空桃花寒梅上李舍人窮山觸目紛茅葦此意昏昏誰可洗竹間忽破一枝梅對月嫣然耿寒水吟詩索酒滿髙堂穿簾的皪射晶光世上羶葷来不到翦翦天風吹冷香人言百花睡未起獨冠羣花差可喜那知和羮自有期未用爭雄􅐦桃李但憐雨雪正濛濛寒意未舒萬象窮故作選鋒驅殘臘挽回天地變春風送李狀元還朝元戎簾幙海濵開謫仙騎鯨天上来尊前談笑賛籌畫一洗八郡無氛埃功成揮鞭朝玉闕九重閶闔開春色要傳天意下人間翰苑政須萬人傑我今去國已五年天子令伴黄冠仙邂逅相逢君復去林泉還我擅雲煙君去上天欵天語莫畏雷霆作强禦人間疾苦欲叩天天門嵯峨隔雲雨紅巾十萬今已無致此紅巾本何如撥亂倘知原始末制梃自可鞭羣狙霹靂松老榦千年如削鐵蟄龍釀春未肯泄阿香推車動地来振起虬髭上天闕砰轟一聲驚倒人雨勢更挽銀河月溟洲六月海生塵一朝化作無邉春題梅齋江邉蘆葦風颼颼東君一㸃破寒愁窗間疎影横春瘦枕上冷香尋夢幽夜半竹折驚殘雪醉起捲簾千山月肺腑洗空龍麝腥落筆天香鬬清絶栟櫚集巻四
