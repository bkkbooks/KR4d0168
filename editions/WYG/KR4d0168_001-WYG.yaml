body:
  text: 栟櫚集巻一宋鄧肅撰絶句進花石詩狀太學生臣鄧肅右臣竊見東南所進花木怪石無甚異者又不能無費臣今有策欲取天下竒絶之觀畢置皇帝陛下圃中比之今日所貢者固萬萬勝之較之今日之費則無萬分之一臣已撰成文字一軸伏望宣索花石詩十一章并序臣聞功足以利一國者當享一國之樂德足以備四海者當受四海之奉恭惟皇帝陛下至仁之所尠神道之所化畢乎無外不可量數如一元黙運萬物自春豈特宜民宜人使由其道雖鳥獸魚鱉莫不咸若是其所享宜何如哉雖移嵩嶽以為山决江海以為沼竭東風之所披拂者以為臺榭之觀且不足以奉聖德之萬一區區官吏輒以根莖之細塊石之㣲挽舟而来動數千里竊竊然自謂其神刓鬼劃冠絶古今若真足以報國者以此觀之是特以一方之物奉天子曽不以天下之物奉天子也臣今有策欲取率土之濵山石之秀者花木之竒者不問大小尤可以駭心動目畢置陛下圃中若天造地設曽不煩唾手之勞盖其策為甚易而天下初勿知也臣獨知之喜而不寐謹吟成古詩十有一章章四句以叙其所欲言者雖越祝代庖固不勝誅然春風鼓舞之下則候蟲時鳥亦不約而自鳴耳惟陛下留神幸甚幸甚蔽江載石巧玲瓏雨過嶙峋萬玉峰艫尾相銜貢天子坐移蓬島到深宫右一浮花浪蕋自朱白月窟鬼方更竒絶繽紛萬里来如雲上林玉砌酣春色右二守令講求爭効忠誓將花石埽地空那知臣子力可盡報上之德要難窮右三天為黎民生父母勝景端須盡寰宇豈同臣庶作園池但隔墻籬分爾汝右四皇帝之圃浩無涯日月所照同一家北連幽薊南交趾東極蟠木西流沙右五是中嵩嶽磨星斗下視羣山真培塿千年老木矯龍蛇天風夜作雷霆吼右六三月和風塞太空天涯海角競青紅不知花卉何逺近六合内外俱春容右七聖主襟胸包率土天錫園池乃如許坐觀塊石與根莖無乃卑凡不足數右八飽食官吏不深思務求新巧日孳孳不知均是圃中物遷逺而近盖其私右九恭惟聖德髙舜禹一圃豈嘗分彼此世人用管妄窺天水陸驅馳煩赤子右十安得守令體宸衷不復區區踵前蹤但為君王安百姓圃中無日不春風右十一巖桂雨過西風作晩凉連雲老翠出新黄清芬一日来天闕世上龍涎不敢香梅不顧冬殘自在妍笑將疎影弄嬋娟小軒不用垂簾幙我醉花香自得仙泛江風迴浪急月初圓携得魚竿下釣船自是髙歌星斗上不須騎氣夜行天姜池源廟二首樽酒源頭一拜神麕羊甕繭便青春當年旱魃矜餘虐禱去陽侯失舊津其二博帶峩冠新廟像長衫紫領樂耕民雨暘從此如常德願作常山薦號人靈應寺松篁擁翠入雲間雅稱髙人巻道閑自是紅塵飛不到一溪流水遶青山又老木森森小徑斜淡烟横鎻兩三家晩来欲冩瀟疎景舉目遥岑更望賖偶題一葉漁舠破曉煙山環碧玉水連天滿傾竹葉倚紅玉天遣行雲慰謫仙靖節先生祠下五柳歸来昔陶公七閩召還今鄧子不將出處作殊觀便了陶鄧無生死鄆州道上早行疎簾不下縱荷香夢破紗厨月滿廊笑盡一杯鞭馬去恍疑山色是家鄉寄張應和運副當年曽忝從官班再拜天顔咫尺間今歴千山嫌未稳芒鞋明日又登山又土屋茅茨山萬重隂雲不解雨濛濛桃源目斷知何處身在杜陵詩句中詠史雨過東山春意濃但携桃李歩春風眼髙四海無勍敵百萬貔貅一體空又五湖范蠡携西子三國周郎嫁小喬盖世功名聊唾手何妨樽酒醉妖嬈戯題我欲開樽百物無鄰家酒熟各觴吾扶杖出門又應供三生恐是賔頭盧訪故人天寒嵗暮兩無聊訪戴那辭千里遥直上洞天三十六馬蹄迤邐醉瓊瑶題枕碧閣清流繩斷炎洲境松響挾將寒意来坐上逸情留不住欲随風月過蓬莱次韵李狀元送酒年年樽酒是生涯赤脚曽無解語花明日可来文字飲新詩共吐半天霞次韵順之奏雅誰回厄㑹作民禄慿君上天厭人欲要將勲業稱貂裘世間豈曰無衣六右一謫仙酒渇要吞江劉毅一呼從此欲當知明瓊亦有神引上洞天三十六右二夢蝶莊周心槁木入柳穿花本無欲杯酒行春當此時忽遇清風一百六右三神仙醉歌天上曲暖春肯念人間欲謾將郊島繼韓豪五出那配天葩六右四鳳池小飲北山知有出郊心為霽春寒十日隂水石本為遷客共一枝瑞玉寄深林落梅一夕狂風雨萬英醉扶筇竹踏疎星歸来衫袖天香冷一洗人間龍麝腥右一飄零不用嘆春工風味端期鼎鼐中欲攬陽和歸宇宙何妨飛舞作先鋒右二和鄧成材五絶扶筇欲過北山来政賴詩囊一笑開故走溪山尋勝景為君携向筆端来右一僕在衫口未謁成材先逰靈岩酒兵招我破愁城頓覺春風拂面生却道豺狼飛小艇當知捩手又飜羮右二成材詩中相招而某又避地西去不能往赴朱紫紛趨舊日班羡君不動屹如山巻將禹稷平生志掉首歸為陋巷顔右三建昌已拜畨檄成材棄官歸里句法徒能泣鬼神文窮欲餞嘆無因臨存多謝知音鮑為洗胸中萬斛塵右四嘗辱成材過避地之所卧龍何日起南陽萬騎追風競挽强射落長庚作頑石坐令四海復農桑右五南歸醉題家圃六言填海我如精衛當車人笑螳螂六合羣黎有補一身萬段何妨又近輔暴追狼虎聖君德大乾坤萬里去黄金闕一杯得杏花村栟櫚集巻一
