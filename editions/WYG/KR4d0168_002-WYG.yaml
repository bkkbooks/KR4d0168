  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0168_WYG_002-1a, image: WYG1133/WYG1133-0265c.png}
body:
  text: 栟櫚集巻二宋鄧肅撰律詩凝翠閣陪李梁谿次韵欄前碧玉四圍寛滿座清風文字歡霜氣襲人秋更爽磎光映月夜生寒登臨顧我那能賦姓字從公遂不漫此景此時難再得相思但把錦囊看謝見招者近體詩兼用鄰韵出入機鋒不契更何圖便合浮杯出上都此去定須安短褐平生那肯曳長裾迴天儻是竒男子綰印原非大丈夫揮手出門殊不惡一帆秋水及鱸魚謝朱喬年喬年觴客以冠帶寓之醉起曰留以質紙筆明日如約朱授筆還冠而以紙為太鮮也却之曰儻無千幅紙竟不往矣鄧子以詩謝之歸帽納毫真得策要牋留帶計何疎公如買菜苦求益我已忘要何用渠開户羽衣聊自適堆忩柿葉對人書帝都聲價君知否寄付新傳折檻朱哭陳興宗先生森森松竹瑣春風半掩柴門一徑通獨歩水雲情似鶴對人談論氣如虹詩書當日三冬富光燄他時萬丈雄忽馭冷風徑歸去長庚依舊耿秋空右一虀鹽昔者謾儒宫葦白茅黄處處同十載從公煩㸃鐵寸毫今我稍披聾一泓漸笑牛蹄水萬里初觀羊角風欲反三隅嗟已矣兩行衰淚付春風右二滿目悲辛誰與言叩門不應更依然一斑昔我常窺豹五色還公自補天新壠只今堪挂劒枯桐從此不調弦典刑今有阿戎在定與相從對白蓮右三無題風行水上偶成文暖入園林自在春換骨雖工非我有嘔心得句為誰􅈿三生戒老詩堪畵千古長庚筆有神不用臨風嘆奔逸簞瓢一笑舜何人西庵餞春傍水禪房半掩門乍晴簾幕捲黄昏風驅紅雨春何在酒入香肌玉自温勿笑飢腸充笋蕨須將醉眼盖乾坤杖頭更有百錢在明日還尋未到村喜雨萬里炎州政鬱蒸阿香搥鼓忽砰轟雲驅鐵騎千山合雨挽銀河一夜傾龜坼有田皆灌灌蝟毛無稲不生生髙樓破曉朱簾捲六合無塵萬象清其二暘蟲赫赫欲流金夾岸垂楊失翠隂已恐人間被湯旱誰從天上作商霖崇墉定有千箱積果腹同傾四海心我亦不須憂脱粟聊賡既醉入瑶琴再和宰公誰向人間脫甑蒸煩公大計激雷轟髙才自是百夫特出語當令四座傾霖雨雖從天上降煙雲要自筆端生吹嘘六合無凡骨例欲乘風欵太清右一斗樞不見走蛇金萬里晴空無寸隂郗扇雖交更揮汗嵩車才出輒成霖詩如翻水驚黄絹力可回天在赤心百里敢煩天下手豐年無事但鳴琴右二次韵龍學丈水色山光入畵屏浩然相對自由身芳菲莫恨無情去天地常藏不盡春倘得江湖化酒醴何須瓦礫㸃金銀是日諸公各論燒丹花開花謝兩休問且向樽前一笑頻和姜季資入手新詩奪化機一天星斗夜無輝想君佳思真泉湧索我强辭侣箭飛平昔端為覆醬用臨時那得錦囊歸不如且遣長鬚去兀坐冥捜更下帷雪際嶺狂直初無渉世才雷公斥下九天来面衝風雪吹三月鳥避干戈易四迴帶雪燒柴平體粟瀝槽沽酒慰飢雷如聞明日登閩嶺茅舍春風夜滿懐和邵宣教未須絶跡便飡霞且飲當朝諫議茶法水有縁隨逺浪汚泥無計染蓮花千篇信筆花無語萬里浮螺觸處家已悟色空元不兩䕫蚿何用更憐蛇仲子叔明二邦君兼濟子安德和文明四使者同過逐客於文殊偶食無肉客既滿意而主人畧無愧色作詩一首謫宦亡聊又出奔敢欺冠盖也臨存豪華自厭蒸人乳冷落能来叩席門莫嘆愁腸充苜蓿從来醉眼盖乾坤相知政在世情外賜逹回窮不足論送丹霞白蓮結社記前縁偶到人間共一年對坐三生形已改相逢一笑性猶全法縁振地公今佛逸思磨天我亦仙明日清風飛短棹羡師先去得林泉遣妓吾徒得酒便超然何用紅妝惱醉眠宻約自憐非宋玉官差聊復凂梅仙樽前起舞無鸜鵒坐上求歸似杜鵑去去眼中無俗物却將詩律絆春妍逰山花柳年来不忍春出郊聊復寫憂熏天因御史欲飛雨山為文公却霽雲寸舌不須論理亂一犁安得遂耕耘慿君且盡杯中物酒惡花香自在聞謝吕友善見和扶筇西去謾尋春獨學無人沐且熏便欲問津從桀溺當時折檻愧朱雲隂霾滿目慿誰掃芳草連空未易耘家學定須興尚父威聲一振九州聞謝吳少綝和茅齋對語夜生春簾幙低圍沉水熏冷坐顧余心似鐵題詩羡子氣如雲山巔有蕨應同采郭外無田可獨耘市酒盈樽且狂飲兒曹昵昵不須聞次韵茂實之才謫官誰道不知春出郭猶能一醉熏銀筆争題追鮑謝席門琢句擬機雲東垣敢念百朋錫南畞當從千耦耘剩乞新詩殊不惡恐因叩角徹天聞秋日白蓮竹外玻瓈十頃寛水芝髙下刻琅玕冷香剪剪秋風動孤艶泠冷曉月寒康樂氣豪猶出社易之韵俗更誰看笑談今日親姑射太華髙吟不數韓訪故人扁舟載月隨夜風曉到溪源訪老農水骨借風鳴活活澗毛被雨緑葺葺竹萌已削瓊瑶白村酒仍沽琥珀濃醉倒田間無一事九衢車馬自衝衝瑞鷓鴣北書一紙惨天容花柳春風不敢穠未學宣尼歌鳳德姑從阮籍哭途窮此身已落千山外舊事迴思一夢中何日中興煩吉甫洗開隂翳放晴空羅知縣挽詩閉門經史自優㳺氣宇凌凌上斗牛從政逝將除鳥䑕傳家那肯墜箕裘人間端欲揮銀筆天上俄聞記玉樓山北山南何處問翩翩丹旐舞殘秋次宋左司韵往事無如今日新鑾輿一再慟䝉塵陽微隂極故多雨柳怨花愁不忍春已遣侈心傾虎帳行收淚眼拜楓宸眼前惡景君休問勝負相資臂屈伸戯彦成端友一天梅雨亂繽紛二陸超然樂事并師命炙牛携越妾相如滌器對文君閉門嗟我如孫敬載酒誰人過子雲窺竇有心公肯否要將文字雜紅裙寄張子猷九州征馬暗塵埃政恐狂瀾不可迴敢念陶潜舊彭澤當尋阮肇過天台三朝我乏回天力一壑君還釣月来便好相從長夜飲簞瓢新有晡青苔自嘲蹤跡平生半九區醉倒時得蛾眉扶連年兵火四方沸一飽雞豚半月無往是今非孔北海分司自到賔頭盧巻簾月色招人醉三百青銅徑自沽偶成蒼苔白石兩清幽縹緲紅橋跨碧流日過忩間騰野馬雨餘牆角篆蝸牛飢寒不作妻孥念笑語那知天地秋一注水沉叅鼻觀掃空六鑿自天逰又夢破南窓裊水沉卧看素壁挂瑶琴絲絲細雨晩煙合閣閣鳴蛙蔓草深但得甕邉眠吏部不妨跨下辱淮隂何時樓上登晴景一醉聊舒萬里心又萬里歸来卧白雲蚍蜉撼樹政紛紛大兒文舉知何在巨擘於陵亦漫云空洞能容數百輩䝉朧如見月三分小槽誰有真珠滴徑覓吾徒作半醺次韵王信州逐客難叅國士憂扶筇萬里過閩甌藜羮充腹初無憾楛矢凌江生計愁長夜漫漫不肯旦梅霖灌灌未應休醉中我欲呼風伯一掃隂霾霽九州右一風波未暇怨浮萍多謝朋来慰此情君似張慿真理窟我慙侯喜得詩聲酒盃莫向吾徒淺句法當令叔世驚又恐諸生連茹去堂堂王室要扶傾右二平生恥為一身謀枘鑿方圓兩不投蟣虱但知貪肉食醯雞何足語天逰雪餘自閉袁安户月皎時登王粲樓更得吾人詩句好當知此樂與天侔右三栟櫚集巻二
