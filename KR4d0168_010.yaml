  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0168_WYG_010-1a, image: WYG1133/WYG1133-0302a.png}
body:
  text: 栟櫚集卷十宋鄧肅撰古詩謝李舍人題額寸草春未報秋風樹不停三年真忽爾過隙白駒奔廬墳吾豈敢北堂有老人作庵居釋子佛事勤朝昏太史憐此意髙額揭顯親梁間垂玉筯壁上靄飛雲顧我何為者傳家空一經栖遲已三十寒燈尚短檠北轅將適楚捩手或翻羹那能為親顯只可充添丁但念我先人白首困飄零射策不逢賞青衫脫王庭今焉逢太史發揮自身名坐令九泉下冷骨復生春顯揚今在此松楸萬世榮作詩敢論報欲為几上銘陪李梁溪逰泛碧涼天夜無雲寒江秋更碧冷照月華中水天同一色畫船渺中流三更羣動寂清風逺相隨蘆花秋瑟瑟近山得桂香隔煙起漁笛樓臺半有無疑是化人國我生本無事釣竿勤水石今宵更可人仍侍君子側浪登元禮舟本非謫仙敵斂手看揮毫光芒騰萬尺本上人乞食自王城駿筆揮萬紙開緘動心目忽忽龍蛇起便可老煙霞聲價日千里那知未滿意更訪栟櫚子栟櫚亦何人是心如灰死愳語滿人間春風自桃李慿君一笑揮萬事空一洗但了風動幡在處真投水願將廣長舌語出亦粳粃回到我輩人政堪覆醬耳和作哲送令德我瓠非五石安能枵不用但恃少年氣未肯就羈鞚越人已斷髮章甫浪出宋何如子建文脫口人爭諷笑示善者機綺語時一弄妙竟祕不傳尺管閣雲夢固應羞芹藻清明奴𨽻共明年欎梧桐定作喈喈鳳歸來訪原憲慎毋學子貢故人猶未病反已能求中宴坐軒客食突不黔馬上肉消髀所得知幾何此生亦茅靡何如豐岩公一室萬緣止竹林能清幽岩竇富竒偉關門寂無人燒香坐隱几今年忽猿驚杖屨數百里持此凝宴坐老師一啓齒我心死灰如春風吹不起請君看九淵止水即一洗舫齋寓形天地間一枝慎所處到眼無溪山堆胸自塵土陳子作舫齋端能世外趨笑傲風波境恬無風波慮循本魚可觀灰心鷗自舞風景雖可人分手聊四顧紛紛逐末流誰援沉迷苦吾事在濟川慎勿五湖去泛舟示子秋江十日雨破浪飛危檣恍如在天上萬頃煙茫茫狂風自南來桂花雨新黃停杯不須飲且飲空中香平生四海心老大愧周郎聊復隨孺子解纓濯滄浪北斗挹酒漿天孫織衣裳乘興拏舟去一笑上銀潢黃卷堂世人無逺韻挾策下浮雲識字僅有數得志無短檠太丘妙家法不肯鹵耕耘藏書浩無際兀坐觀滄溟寒陋鄙李雍假書勤朝昏過眼如杜甫散為筆下神一家今四傑射策到王庭自視猶細事家孰方討論嗟我未聞道政作鑽紙蠅會同阿戎去從公問斫輪過黃楊岩朔風夜號空于喁幾枝木深山自春色芳草不凋緑朋來得佳逰招提藏翠麓新酒赤如丹竹萌肥勝肉一醉出門去缺月挂修竹歸路涉溪淺危橋踐寒玉夜過渭濵居門庭故不俗對坐寂無雨泉聲如擊築宗盟更可人相邀勤秉燭開緘得捷音鯨鯢俱靣北回棹今可矣賞心嗟未足西去有竒巖佳名配王屋箕踞列十人未充空洞腹更約林宗俱來伴白雲宿飛螢谷雨已十日不散隂雲頑夜風翼腐草借光蒲鶩間往來自相照似欣天地寬何時東方白紅日開雲端次韻王信州古風我昔少年日氣與風雷壯一言既不合掉頭歸望望誓將老煙霞叩角耕間曠一日煩干旌叩天舒孟浪自譬舟一葉沙溪春蕩漾百川倘已東吾力那能障尚賴天地寬未即崇山放栟櫚付冷居乃為世所長老妻畫紙棊赤腳沽村釀醉起舞彩衣吾道頗休暢人傑又鼎朱不怕供詩帳酬唱激清風洗空煙雨瘴故人化鶴仙穹廬共悽愴生還義更髙褁飯逺相餉演山見長庚醉眼不敢仰便結騎􅚪逰不知飛燕謗蘭亭最後來德齒均所尚傷時雖慷慨論事尤倜儻杯酒七峰下逸思九天上萬事俱可人祗欠蛾眉唱再次韻謝之四海王信州志氣老益壯家學九域聞人物萬夫望若使在廟堂天下無怨曠胡為一葉丹也泛閩溪浪顧今真斷梗江淮付搖漾逢人輒傾倒涉世無隄障既合越人瘠仍欲鄭聲放斥下九天來宜似幽怪長一作幽怪多冗長邂逅忽相逢琥珀傾新釀火急賡歌詩胸臆賴舒暢我語無餘韻日書甲乙帳得君驅鱷手不憂潮陽瘴三年去國心海隅日悽愴東家久不燔稚子誰將餉詩成豈置之萬事吾不仰那復思重裘區區欲止謗明朝更可人芒鞋窮好尚遙知翠微中髙談得縱儻至樂麯糵間虛名鐘鼎上輕重不須論杯行且酬唱再次壯字韻昌黎論佛骨南行氣亦壯獻書請鏤玉却起北歸望香山最風流詩酒事夷曠那知聞琵琶淚濺九江浪此身苦海中風流隨蕩漾妾見分南北無乃眼中障嗟我果何人楚狂本天放外物不須論有身今已長斥歸水雲鄉日醉蓮花釀茗飲過陸羽禪悅得文暢安此更何求萬里脫氊帳死生則置之北邙豈俱瘴使君憐我愚了無逐客愴謂我耕白雲不獨齊眉餉詩來覔歡處光芒不可仰欲醉桃李春那憂貝錦謗赤腳敢云無社舞非時尚侯門列蛾眉一見吾其儻拋磗此當先積薪君在上更為李與蘇兩家按斯唱第四章兼簡其子鳯卜雖蕭條虎筮固豪壯要皆有得失未息助中望那知方寸地太空等虛曠川逝水不流石髙風自浪鄭五相府榮謝三漁舟漾闕鼓瑟鏗爾捨扶杖嚗然放在我本不虧底處更求長獨挂百錢逰無人捉私釀醉歸一腹春滿紙揮琴暢風俗通記凡琴曲和樂而作謂之暢因憂愁而作謂之操珍重江左王德劭宜絳帳天遣千里來不顧閩山瘴大言臭味同政可慰悽愴誰知金玉豫詩成即相餉筆力到天心開卷人爭仰但勿賦兔葵小兒易生謗獻之詩更可句法晉宋尚從渠得精深嗟余真恍儻何當日相從煩君更語上徑追太古風三嘆連十唱荔子荔子有佳品乃在府城東我來方秀發黃雲疊萬重遙知香味色已具碎花中憑欄一念足不食意自充人世如夢耳當體色即空謂是為真實便可侑千鍾謂是為非實真飽亦何從虛實兩無有棲髙雨濛濛避地山谷大禹不到處石壁誰鑿開雲端欲相搏飛出白雲來餘沐亂飛雪雄聲敵春雷泝流湧百尺銀山陟崔嵬顧我雖逐客解雨已春回嗟此天盡處胡為乎來哉萱堂有垂白蓬室紛提孩內外三百指奔竄若為懷我疑雲水間亦有天下才何時日三錫一振紀律頽羲和儻中天六合無氛埃鼠壤與蟻穴不風當自摧坐令陋巷中依舊樂顔回亦能書要荒朝會叩天階次韻王信州逰棲雲勝逰出林杪參天僅一分從君如附驥顧我願為雲野色連空碧幽香襲露薰耦耕當卜此橫笛夜相聞栟櫚集卷十
