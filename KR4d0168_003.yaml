  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0168_WYG_003-1a, image: WYG1133/WYG1133-0270c.png}
body:
  text: 栟櫚集卷三宋鄧肅撰律詩和李梁溪春雪韻白白朱朱春已深那知雪意更隂隂落花幾陳遮山密穿褐餘寒賴酒禁騎馬不前真有恨留衣過臘豈無心等為遷客俱逢雪誰侣梁溪獨醉吟又玄冥忽欲作春容不許東君利自封已使素英拖暖絮更摧妖艷别寒松那知往事思飛燕預慶豐年免象龍向有謫仙詩句好何妨閉户醉金鍾送春宿雨初開萬翠屏相携雲水自由身寸心未逐鶯花老一笑能留天地春倘得新詩同刻燭不妨濁酒共傾銀往來一氣何須問蝙蝠飛時日正辰分嵗餘臘羈人少共歡那堪瑞雪降雲端四時欲盡三更鼓六出翻成兩嵗寒欺􅐦嶺梅殘艷白密敲亭竹碎聲乾公卿休掃黌堂下留與來朝賀客看鄰家翁挽辭凛然風韻老尤癯方寸經營包九區窖粟巧為任氏策縛船冷笑退之迂深藏未肯驕僮僕儉德端能率里閭故使考終踰七十不因財害似齊奴其二髙堂晏坐亦何忙金水聊觀毁與穰逺配刀間籠桀黠未饒倚頓埒侯王桑麻有畝今千計牛馬難言用谷量可惜一朝螺變黍千金無藥治膏盲從昭祖乞糖霜甜滿中邉一夜氷璀璀璨璨自天成冷香入骨追瓊液秀色當筵瑩水晶絳闕不須餐沆􅒭玉池何事養胎津從公乞取洗蒸欎一馭寒風上太清避地過雷霹灘門前又見馬如流兵革繽紛幾日休嶺似車盤方稅駕灘如雷霹更行舟鯨鯢敢侮乾坤大江海徒深蟣虱憂安得將臺登李郭挽回羲御照神州偶題才薄難趨供奉班歸來作意水雲間謫官謾説九年計客枕曽無一夕安渭水不應藏釣艇淮隂便合起登壇喚回勝境慿夫子使我甘歸苜蓿盤次韻謝明逺和乞身大小為溪山征鼓不容簔笠間酷暑扁舟同海角暖風杯酒念長安髙情我自歸蓮社妙譽君應冠杏壇更約三山少從欵赭虬吐卯粲金盤題步瀛閣玲瓏畫閣入鴻冥隱約鴻冥入太清紫氣氤氲隨去步青霞杳靄入行旌桃花浪透三山近龜角屏髙七朵橫解逐梅仙在塵世誰知塵世有蓬瀛子安提舉南奔千里已途窮更向長江避敵鋒十口未容謀去住片帆那暇擇西東乞殘不忍從司業食粥新來似魯公賴有詩情摧不老時將新句吐長虹某初欲過興化今乃止耳故詩中具之以為他日志也又征鼓驅人夜發船别來無處寫憂煎髙吟自答㗀嚶嘯旅食時開欎屈筵君去青天才尺五我今白髮已三千何當却飲南湖月顛倒衣裳舞謫仙山中岑寂時有嘯於梁者日中所享不過以鰻魚為絶品耳次韻玉殿曽叨侍冕旒才疏意廣誤旁求彚征那敢私連茹勇退何妨在急流蓬蓽已無原憲室江山且飽子長逰西庵軒檻多風月幸子來時共茗甌又怪底祥光夜滿門朝來入社得詩人空疏嗟我句無眼俊逸知君筆有神共隱兵戈不到處相携雲水自由身便當痛飲追河朔紅雪繽紛膾錦鱗次韻郭宰兼簡丞尉獨領詩壇卧北窗故應落筆士夫降笑談自掃剡藤萬聲價曽髙魏闕雙六合便當歸化筆一同聊復賞澄江初無肯綮煩遊刃夜飲何妨取萬缸右一只將詩律對晴窗我本無為人自降曹子棒頭施五色崔侯廳下植松雙千篇堪友騎鯨李八詠當奴夢筆江文字興餘行樂耳肯容碧玉自盈缸右二一點螢燈續曉窗已千人十未甘降見聞僅得豹斑一勝負猶爭蝸角雙山聳劍鋒登九坂浪翻銀屋度三江歸來自在春風裏時得萱堂獻酒缸右三洪丞和來再次韻堂堂國士洪夫子刻燭從渠心自降妙手故應釣鰲六得君那用射鳶雙定隨國老興東海肯效騷人慟楚江酒醴祇今須麯蘖要令六合共盈缸右一世事無由到竹窗只餘心賞獨難降雨餘翡翠山連七春漲玻璃磎自雙萬壑不須看越嶠千尋端可配吳江摳衣便欲同清景安得黃封列萬缸右二又述萬里歸來一小窗利名心滅不須降雖無何子食錢萬未到潘郎雪鬢雙樓上詩狂欲騎月晚來酒渴思吞江從今痛飲須論日瑣瑣那能問幾缸成彥女奴琵琶婷婷裊裊出紗窗坐使紅籹萬目降翠袖薄籠春笋十玉叉初合緑雲雙四弦對客追三疊萬喚令人憶九江曼倩酒狂本無量為渠瀲灔倒銀缸寄璨老西軒水沉一炷裊晴窗默坐無心可得降浥露菖蒲能寸寸語晴新燕自雙雙祇今淂兔不鑽紙那用浮杯更渡江前世逺公只師是好從元亮供千缸林提學挽詞文陳曽驚賢士關青襟袖手仰登壇當年聲價輝寒谷晚節清貧耐嵗寒地下修文屈顔子人間談易笑丁寬傳家賴有千人傑三接天衢不作難提學嘗橫經上庠朝鮮受其傳以歸和陳少卿懶從蒿目世間憂緩步招提味九丘正論羡君無鄭衛窮途慰我在商周飄然忽作遷喬興卓爾難追跨海逰别去詞源應萬斛幸分涓滴洗離愁謹次第三章海角誰能寫客憂童顔鶴髮顧崇丘風流君似東山謝勳業余慚赤壁周落筆敢陪風雨疾扶筇時共水雲逰明朝却羡先生去萬頃煙波醉莫愁别陳少卿平生杯酒百無憂四海風流陳太丘據景筆端凌鮑謝當年門下得伊周那知避世嶔崎迹也許從公汗漫逰聞説片帆今又舉三山無處著人愁偶成我生詩酒弄林泉紫詔三呼出洞天髙視塵寰但蚊睫冷看時輩聳鳶肩山間已袖嬰鱗手物外今還釣月船若使兒曹知此樂人人同得地行仙其二數椽茅屋傍山隈野草如雲徑不開小院縱橫行蟻陳孤燈明滅縱蚊雷并包益見乾坤大掃滅何時風雪來磊塊胸中何處洗酒行到手莫停杯鳳池小飲愁見孤城萬馬屯山行飄若出塵樊臨池想鳳心皆妄據檻觀魚道更尊笑吸百川淋酒渴旁看三峽倒詞源人生適意須觴詠世事升沉不足論次韻鄧成彥搶榆不羡貼天飛冷落柴門半掩扉花榭水軒催客老飯羮酒甕與心違風流沈約自應瘦美好陳平今已非誰似宗盟重山嶽九環金帶稱腰圍戲洪丞萬里歸來雲水鄉逢春得酒且倣徨好賢誰似雙松吏使我時終一石狂忽與髙堂來鼠目却令朱户鎖梅粧先生取瑟吾知已安得從今不舉觴次韻凝翠閣看水欄杆十二俯煙濤冒雨從君一醉陶頗覺寒窗侵島瘦故將勝景助韓豪波聲裂岸漁歌逺水勢橫天釣艇髙前日主人今國老乘桴何處泛滔滔再次前韻蕭條門巷半萊蒿杯酒田間亦自陶採栗久要工部拙騎鯨偶厠謫仙豪狂歌故作風雷噫逸興何妨日月髙勝景賴君佳句􅐦胸中江漢更滔滔又琢磨佳句敵離騷賴得朋來漉酒陶時遣紆餘資卓犖更將華妙濟雄豪閣臨巨浸南溟近簾捲晴空北極髙更約髙談句法外可憐天下正滔滔陳大夫華嚴閣星郎德望欲摩天坎止流行任自然直道不回真鐵石髙懷未老已林泉宗門夙了風幡動傑閣聊修香火緣顧我驅馳成底事羡公真是地行仙栟櫚集卷三
