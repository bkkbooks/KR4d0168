body:
  text: 栟櫚集卷九宋鄧肅撰古詩後迎駕行揮鞭衝曉露歸鞍載夕陽一日復一日不見御袍黃偏諸須文繡氊車奉圭璋作意禮樂盛而乃訪毛嬙上皇襲太平珍怪來四方竒氣驚鬼劃舞腰欲雲翔端為大盜積萬里來貪狼文移急星火搜抉到毫芒伐柯則不逺吾道其復昌君看天宇間紫微已輝光躍馬今朝去定拜玉爐香惡衣供禹御茅茨覆堯堂為邦消底物人心歸則王鄧成彥邀李益之朱喬年及某一飯適忌日無侑觴者遂遲明日成彥偶在式假以食素謝吾三人朱且行僕因以詩促之點額萬里歸兀坐冷如水慙愧北阮賢為余欣設醴既邀折檻朱仍約騎鯨李人乳已方丈清歌已皓齒那知事大謬及誤占食指得鹿倘是夢翻羮得無鬼我生飲紅裙萬事空一洗所失如蝟毛豈惟一飯耳端恐荀陳會自此參辰矣慿公反髙陽勿専蘭亭美主人或素餐蘇晉端可擬何妨具一烹肉食從客鄙偶成我涉江東路平地雪盈尺明日疊芙蓉晴天開曉日朅自婺源來隂雨連朝夕瘦馬過雲際又斷簷間滴顧我亦何人市朝欲歸迹平生詩酒交落井仍下石那知涉畏途乃煩造化力要知萬里行人謫非天謫衡雲霽韓愈海市呈蘇軾君知此理不鬼物護狂直古意妾身如暮雲隂霾愁漸濃郎來如曉色日髙雲自空曉色未應夜愁雲不可重會持一杯酒舉室生春風其二妾心如寒梅隨郎遍江東郎身如飛雪知落何亭中雪花故清絶何人能擊節梅花嵗嵗春千秋香不滅其三妾如傍籬菊不肯嫁春風郎如出谷鶯飛鳴醉亂紅亂紅有何好風雨一夕空菊英雖枯淡不愁霜露濃觀子陵畫像陶朱防狡兔渭濵兆非熊先生但釣月君王友不從我昔訪其迹磎光磨青銅呼公公不應天籟自號空何人知此景携歸梵王宫乃知夜半力端在寸毫中謁南齋諸友青青門外竹練練澗中流水佳自扣枕天壤無炎洲我友有髙韻來為扶策逰塵埃飛不到軒窗寸寸秋髙文穿天心細字編蠅頭氣豪欲騎月志鋭定焚舟我來初過雨衣衫宜翠浮平生百斛塵一洗空不留歸來短檠下清風入夢幽不知白蓮社肯容靈運不再用南齋韻謝沙溪清可啜逺山翠欲流翩然航一葦浩歌入蘆洲髙堂上木杪幽人事勝逰但足簞瓢樂不知天地秋我輩嗟無口冥搜空掉頭何如三才傑等是濟川舟開卷騰光怪天上卿雲浮阿雲又嗣音吾研不欲留平生浪詩聲寒蟲號清幽已對狂道士從此敢吟不登妙峰閣維舟古木隂故人能倒屣相携步髙閣千尺誇雄偉雨餘天氣清宇宙空如洗對面碧玉峰去天不盈咫慿欄一超然欲摶九萬里下視囂塵間蠢蠢欲蟲耳平生浪自苦馬上肉消髀匆匆欲何之燒色更隱几入夜寂無人波聲欄下起坐覺非塵寰雷霆生腳底逰東山草木得新露襲人吹冷香泉水夜相激衾枕自清涼我携謫仙人眉目秀而長髙樓洗塵纍抵掌論老莊若人不世有闕跨皓鶴同作雲間翔雲際嶺蒼蒼九萬里拍塞雨天葩雲際在天上我去更携家不知山髙低晶熒浩無涯回頭見侍者濛濛隔瓊花謝丹霞老師丹霞修何行天花雨紅英草莽化金碧宴坐十年成落筆多竒語酬唱皆名卿微言寄禍福無心天籟鳴頃年來七峰見我眼增明西來的的意一語貫三辰坐令塵土人彈指悟無生别來今許久夜夢飛爽靈新詩忽入手春風死草萌公以慧生定我自明而誠相望雖千里秋風共一清去去勿作念明鑑無將迎玉山避冦前年十月間甲兵滿大梁小臣阻天對血涕夜沾床去年十月間左省謫征商扁舟歸無處江浙俱欃槍今年十月間叛卒起南方官兵且二萬一旦忽已亡一身幸無責奉親走窮荒天宇如許大八口無處藏空山四十日畫餅誑飢腸朅來古招提和氣靄修廊迎門有禪伯梵行照穹蒼却念客無歸燒豬飯蘇郎方袍二百指祖燈其復光中有護法人義氣干天槍倒床得甘寢不知冬夜長明朝曹夫子破浪飛危檣入門郁春色滿船載瓊漿髙談鸞舞飛佳句刻琳琅那知奔竄中一樂得未嘗何當掃隂雪四海共春陽便携我輩人浩歌歸醉鄉世事如奕棋臧否均亡羊簔衣可釣月底處是金章次韻李舍人道山文章伯杖履作幽棲筆硯為戲事業落翻墨螭平生百萬言定相初不離更憐世間士塵網深相圍笑踵雙林轍誓破萬夫疑八靣列神王劍戟身携持怒目幹龍宫機緘絶謀惟佛語浩無際天地如可彌笑談一轉畢璿璣時未移見者皆了了鈍根化神機不然分三藏誰能俱不移白頭鑽故紙底是出頭時此恩今欲報四顧將誰依在佛本無説於公亦何為珍重謫仙人登山力未疲天涯渺萬里著處即為歸隨緣作贊嘆妙語何竒竒置之天壤間千古無敢非我生多肉障煩公示寶箆請作一言蔽牟尼即仲尼送李司録西赴晴雲聳竒峰烈日破昏霿謫仙有行色朋僚傷逺送嗟哉君子人簿書久倥偬文星應長庚徑氣模螮蝀幡然玉京去佇聽朝陽鳳岩野豈能留端肖髙宗夢塵外堂俯仰天地間紛紛闕山林纍人均一體有真故有妄輕彼那取遺奔走為塵外政應在塵埃慿師一掃空六塵不用洗淵默即雷聲萬川同一水栟櫚集卷九
