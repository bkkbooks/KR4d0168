body:
  text: 栟櫚集巻二十一宋鄧肅撰啓簡上李右丞相啓伏審光被殊恩擢參大政士民交慶社稷增輝恭惟右丞相公先生道貫天人氣彌寰宇盡忠扵社稷遑恤其妻孥初擢栢臺嘗斥脱鞾之力士繼親香案遂同折檻之朱雲扁舟既落於窮山尺紙不干於要路惟居窮固畧無希進之心故位崇高不為患失之慮敢陳大計默契宸衷洗空天上之旄頭擁出雲端之北極措九州於磐石脱萬姓於虎牙撥亂殊勲既出子房之帷幄守成有道更資傅説之鹽梅穀腹絲身要觀實效泥金檢玉何取虚文某頃以青衿久從絳帳兀居閩嶺但足一泓之牛蹄坐想沙堤上摶萬里之羊角雖乏攀鱗之業幸為擊壤之民其欣愉者實倍倫等上李右丞相簡某頓首拜覆比部邸報竊聞入參大政欣躍之餘連夕不寐蓋非謂大厦巳成預為燕雀計實幸斯道有傳而海内均福也國勢委靡無如今日然紀律巳定夫何患哉百姓足君孰與不足太平可以指日矣天下幸甚再啓太平日久不聞鉦鼔之音一且羽檄星馳天下騷動窮鱗不能致死但揮涕耳伏聞先生定大計建大議毅然以身當之笑談之頃脱萬姓於累卵之危顧豈近世學者敢望其後塵哉所幸者樸䔩散才得先天下之願識者款陪杖履於山水之間吟詩飲酒作終年計其為幸甚可勝言哉頃在閩中不知世事如許毎得謦咳及之但見蹙額若不自勝者及來京師於所聞歸拜北堂無復西意敢意今日得觀人傑起佐聖君復祖宗故事與天下息肩遂爾安然為太平民知幸知幸嘗觀崇寧以來火元祐之文以塗天下之目凡官於其時者皆斥而不用未嘗不失笑也天下公器自有輿論故人之賢不肖亦何與於年號耶甚矣小人之惡君子也不知大體但極其私心耳然君子之惡小人亦猶是也倘極其情則亦無所不至矣於此照之不落一邊政賴中庸之道昔竊觀先生有包荒之德不為卓絶茍異之行蓋於行止疾徐之間而得堯舜之道不為巳甚而見仲尼之心者也今也甄陶天下亦何事於蒭蕘之言耶然事師之道猶事君也茍有所聞敢自隱乎僭易僭易寄朱喬年某頓首再拜數千里之逺才抵舍便見君子遂作許款慰懌之懷殆非毫楮所能計也平津送别還復黯然比辰起居如何臨政當有神相某前此狂妄幸脱虎口今當疏泉種竹作安焉計但逺去吾喬年而令德諸友又復他適兀坐深井日覺茅塞耳倘不我棄幸時惠書併近日新作切懇切懇餘惟為吾道百千自壽不宣某頓首再拜大王大風一首聊叙别後眷眷之私二兄畧不見和豈簡驩耶但吾黨中人洞見肺腑不敢以此奉疑耳便風幸首見及也徽城楮煤泉南二香及韓黄墨刻皆勝物也非吾子不能有非老弟不可分幸早專人以慰此鵠立至望至望俞人傑秀才蓋名家之子也頃在泮宫嘗與同舍云于左右曾有一日之雅今在治下他無所求惟覓一安下處想不難應副也千聒不盡堂上太夫人尊嫂宜人萬福令子安樂否老兄貴恙今想平復要當耐煩去之有漸可也藥物有效者點記一二時服之其他雜方幸一切置之為妙炙瘡作否俎豆之間戒之良易衽席之上非斬釘截鐵者不能愼也然所望吾喬年與喬年所以自期者當自知之其可以頃刻之適壞此無窮之計乎越祝代庖雖為可厭要臂巳有三折則能明醫故不可不盡也許簿伯仲余思晦黄彦武諸兄近方作書故不及縷布也某再拜答吳時中某頓首再拜時中祕校吾友坐下作别益久馳仰殆不勝言專人損教感服友誼仍審即日尊候萬福某託庇粗遣未有承晤之幸敢乞百千自壽前膺殊選謹上狀不宣某頓首再拜啓罪逐孤蹤日復一日便當叩角作歸農計但時勢未寧恐不可以安枕耳時中養閑里閈事業但益進也一丘一壑自有高韻世間榮辱不足介念此間朋友雖不乏人議論才學類有可取但進取之志時悻悻然見於顔面間出處殊途終不能滿意時中有暇能惠然肯顧否木牛石馬當有以為公獻也謝丈間居為衆人作佛事使鼠竊狗偷無敢窺其境者乃知此公志在愛人非自為也世間小人雖閨門之内尚與兄弟分彼此孰能克巳如謝丈乎想左右亦有以助之此皆朋舊間美事良為助喜也欲言無窮但不能多幅耳某頓首再拜答陳夢兆某頓首再拜上啓知縣朝奉丈坐前夏熱伏惟宰宇多暇神明贊祉尊候動止萬福某託庇西來巳造建安行遂參見但切欣愉謹先奉狀起居不宣某頓首再拜前日承書叠幅尤荷意勤來卒徑之沙陽更不具狀上謝想䝉照亮某誤䝉召對實出奬提幸見君父以攄所欲論者非恃教誨何以副九重之望哉即干提命得毋金玉其音也某再拜某再拜搬家之喻極荷見教前日被受聖旨令日下就道再有大急起離指揮前後凡十有一次催促自顧何人敢遲延既對之後即歸迎侍使老人不冒畏暑以登途蓋兩便也如何如何栟櫚集巻二十一
