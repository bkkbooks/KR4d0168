body:
  text: 栟櫚集卷二十二宋鄧肅撰祭文奉安陳諫議祭文維建炎三年歲次戊申二月乙卯朔二十日甲戌某謹以清酌庶羞之奠昭告故諫議大夫了齊先生陳公之靈曰靖康之難胎於崇寧相彼元惡治亂巳分人皆見於巳著公獨察乎未形正色立朝上攖逆鱗雖菽粟之奉不給於朝昏而正直之氣蓋充塞乎乾坤若上皇能用公於三黜之後則必無宣和之末若淵聖能作公於九泉之下則必無沙漠之征嗚呼巳矣乎公道興衰係國休戚故公之死生存亡不係乎公而係乎造物昔公南遷義不枉尺斯民企踵猶冀萬一一旦夢奠於兩楹之間四海為之失色善類無歸吾道將絶小人無畏爭臣新室此有志之士所以為天下慟而不獨為邦人惜也聖人念公恩錫日隆平生事業巳勒鼎鐘鄉曲儒生慕公高風參前倚衡若接音容貌公之像血食學宫先聖之道與公無窮尚享沙縣靈衛鄧公祝文維公昔因唐季嘗挫賊鋒脫萬姓於虎牙措一同於化國頃興淵冦昔懷巢幕之危陰賚我邦獨享覆盂之固使華協奏天寵載臨尸祝之來紛如蟻聚廟祠之建粲若翬飛更須左右其民以克終始之德英風冠世洗空天上之旄頭義氣橫空擁出雲端之北極四夷電滅六合春回豈惟一邑之雄要作萬邦之極仰希聰聽俯察輿情宣和八年春一月庚寅聞金人不恭敢拒大邦羽檄星馳郡邑驚擾竊得兵符而讀之往往泣下靖康改元癸卯夜夢有老人東向而坐呼所統之兵紛來無窮皆屛息受命無敢誰何者老人語之曰若等善護此勿撓之羣卒皆曰某屬於公敢他為哉覺而異之曰是何神乎而獨祐我也忽鄭中踵門而請曰靈衛被旨創廟冠絶吾邦出師者爭禱焉但未有祝文幸夫子製之然後知靈衛公果祐吾邑者丙午謹撰此録未果而捷音到矣天兵所指摧朽拉枯因其請降舍之使去嗚呼快哉叩角擊壤將復為太平民矣遂並書之以彰靈衛之迹云靈衛廟賽願祝文楛矢南飛漫天如雪左蔽江南右暗吳越嗟嗟七閩江浙之間凜如纍卵上壓太山我邑在閩浪名富庶兵火鼎來僉曰可慮爰率儒士列拜廟庭冀公之庇以竊康寧天書夜報賊兵稍北奠枕舊居實公之德公德如山我不敢忘既陳牲幣又奠椒漿君恩如天公其可忽既福此邦當佐上國黃屋䝉塵今猶海鄉公其相之萬國來王栟櫚集卷二十二
