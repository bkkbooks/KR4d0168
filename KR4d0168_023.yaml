body:
  text: 栟櫚集巻二十三宋鄧肅撰疏語祈雨畏日炎炎固將爍石斯民切切誓欲焚巫不有一滴之禪孰均四方之惠恭惟定應大師法轉乾坤道周夷夏夙從衆願毎慰羣生今此哀祈更希慈念笑驅雷電去挽天上之銀河澤遍根莖坐失人間之火甕當使斬鵞之忍化為鼓腹之遊實望慈航速濟苦海某等瞻天望聖哀祈之至謝雨佛法如天肯責根莖之報人心似子難忘父母之恩肆啟净筵式陳愚懇竊以時丁流火之候月無離畢之躔涓涓巳絶於牛蹄種種皆頳於魴尾仰賴佛駕俯降塵寰一念囘天驅酷暑於過時之盛連宵倒井起羣生於既困之餘坐令瘁瘁之秋容忽變熙熙之春色然本縁湯旱少憩人間巳作商霖當歸岩竇仰瞻囘馭同傾不替之誠更冀餘波以卒無邊之惠某等不勝瞻天仰聖激切屏營之至天王稱老開堂當年主席曾煩獨脚之䕫今日傳衣可無三角之虎政賴作家之手段來繼本色之鉗鎚再起祥光喚囘勝景稱公禪老夙親文墨毎觀鼻孔之撩天壯了宗乗巳覺脚根之點地挂眼金屑業巳掃之貼肉汗衫予今剥矣用勒三條之篾來覆一把之茅法窟頻伸萬籟俱息禪林蹴踏六合皆驚妙傳六祖之心永祝一人之壽請昇猊座須振雷音高飛新老開堂藕絲孔内既可追軍牛蹄泓中何妨説法況此三家村裏亦是百尺竿頭倘若當人自堪選佛今起南宗之規矩政資本色之鉗鎚惟新公禪老出自梵嚴之叢林來佐天王之法席但知跛跛挈挈何曾暖暖姝姝忽有悟於吹毛遂難藏於磑米今兹拈出分明對箭當胸但看令行不是呼雞作鳳喚囘癡種子接取明眼人坐令蟻穴蜂房俱為佛地何用龍宫王食徒美人觀好振雷音仰祝堯算代人請長老昇座幻體反空巳失倚門之望潮音振地寧須建鼔之求蓋禪悦之門不殊今古故遊戲之際可度人天惟亡男甌寧令尹紹業箕裘律身氷雪雖苦學志於附鳳而用世終於割雞陶令徑歸雅有林泉之趣子文無慍何妨萋菲之讒氣方凛於長虹身忽先於朝露欲追九泉之福可無一滴之禪而等兹有大比丘土面灰頭初不落於兔角拈花豎拂亦何與於龜毛盡吸西江均為法雨生吞栗棘高視叢林願假妙音喚囘英魄巳脱南閻之苦便躋兠率之遊栟櫚集巻二十三
