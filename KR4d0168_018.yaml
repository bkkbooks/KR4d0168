body:
  text: 栟櫚集巻十八宋鄧肅撰記栖雲日新軒自西晉以下祝髮壞衣之禁弛於中國故四海内外江山勝處皆釋子居之凡居寺以領衆者孰不欲峻治其宇以闡揚此道哉凡臨事之初必躊躇四顧曰吾所有者如何求於人者如何事成若否其利害勞逸又如何也故其決然欲為之志巳奪於衰憊不果之氣矣事豈復有濟耶幸而有氣宇不凡斷然若將有為者又其經營措置顚倒錯亂或急其所宜緩而後其所當先顧雖疲精竭力亦徒自紛紛耳此敗椽老屋所以頹圯日甚可以深嗟而屢嘆也故余嘗論天下事曰有欲為之志者未必有敢為之氣有敢為之氣者未必有能為之才三者備矣雖天下可宰也況一寺之小乎或闕一焉雖八口之家亦有不充者況一寺之衆乎沙縣栖雲古禪刹也堂宇卑陋僅庇風雨蓋不知幾百年眞戒大師可臣以百丈法居之才三年余往造焉見其翬飛棟宇屹立寺東所謂庫院者新矣眀年過之則見其金碧相照恍若蓮宫所謂如來寶殿者新矣越闕星布機緘雷動莊嚴之勝如天造地設所謂寶藏新矣余固信若人之竒者也且度其力必窮矣非息肩數十年恐不敢議若事矣近年過之則又見其立殿於藏之右以奉傳經者架堂於殿之下以居閲經者闢宇於殿之上以娯遊息者又創雲㑹堂於藏之左渠渠夏屋可居數百衆草芥泉石之間丹雘煥然又一新也計寺内外當不復可以措手矣而良材山積瓦甓鱗比又若有為者因詰之對曰法堂齋㕑今雖亡恙然數年新創巳傑立雲霄間此不得以獨卑也意必盡新之而後巳余驚問其故曰若歲所入幾何曰聊爾求於人者幾何曰未嘗遣化士然則斤斧之聲積今十年不絶而土木之工鼎來未艾使遊賞之客毎見而益新是何自而然哉曰縮身節口銖積寸進亦隨縁耳余蓋知眞戒之志之氣之才果有絶人者乃與之坐於小軒之上作終日款師以軒榜為請予故字之曰日新蓋記所見也有客難之曰此寺之興十八年矣眞戒之力可以唾手而就期以一二年間無可新者後日過之無乃辜吾子命名之意乎余曰嘻此特眞戒之餘事耳渠得法於雪峯見聞的的出人數等故步陳迹一切掃去蓋嘗與之語亦無時而不新也豈止創立之功哉客無以對余於是併書之靖康改元清明記丹霞清泚軒邵武丹霞僧明賾作軒於其院之西中植菖蒲數種鬱然几案間不逺數百里來乞名於栟櫚鄧某某名曰清泚軒蓋取東坡贊語所謂清且泚是也因為之言曰洛陽之花隋堤之柳篔簹之竹徂徠之松竒質老榦非不可喜要之必資糞壤乃克有生是以未能脱然仙去不離塵土間物耳獨菖蒲之生不事此粲粲怪石涓涓清泉泉石相映凜生寒風於此蒼然得意四時一色顧其與凡草木同列哉其節如夷齊之高其韻如嵇阮之勝其清絶如子猷之泛雪其脱洒如列子之御風其謝寵辱如扁舟之范蠡其安淡泊如釣臺之子陵嗚呼至哉非胸中有是德者烏能嗜此物哉東坡先生首唱此風且為贊叙以問安否彼能輕死生傲爵禄高視四海若無介意者獨於此切切何也蓋公所嗜之意不在菖蒲直寄焉耳賾能為東坡之意乎明窗净几坐見古人如其不然則所嗜一草芥而已賾作字吟詩有吾黨風格其種菖蒲而喜之意決有在也雖然願師進之法眼有云儵然纖芥在此岸永淹畱師其無畱焉可也宣和辛丑中秋瑞芝軒書沙邑栖雲寺法雨沙邑有寶坊曰栖雲欲創寶藏修撰羅公為之唱衆翕然從之閲五年而藏成公又捐錢百萬易經五千四十八巻期以春三月丙辰率衆為傳經㑹就私居出之以實於藏中至斯道俗震動來者千計而天忽大雨勢不可行乃遲一日越旦衆又集而宿雨沛然反如倒井衆乃異之曰嘻有是哉昔戴封積薪而雨降魯陽揮戈而日返雨暘之變端在古人指顧中耳今修撰公畱心此舉非一日積而毎出輒雨天若不協然何也有能辨者曰子不見今日傳經之人乎六根所接無在非塵天其意者一雨以洗之僕對曰雨之所澤特欲沐其體耳烏能洗其心哉辨者又曰梵書所寓必有神物䕶焉今此經畱於公久矣若不忍釋知音而去也僕又對曰公巳生傳此印視心經如糟粕彼神物者亦烏得以去畱為念哉求是而不得焉乃質於僕僕曰夫何事於譊譊耶九年之水堯不得以勝之孟津之雨武王不得以止之雨暘在天人如彼何哉然適逢其㑹誠不能不譊譊也若關此經所得之由乎逺在西域去中夏者萬餘里非若兔興烏逝忽然而至於前也昔三藏法師登危躡險幽入鬼方捫腹不粒者往往繼日如此驅馳經數十寒暑僅能得之以覿中國彼其勤勞為何如哉始得以謂之傳經今也鳴鉦伐鼔幡幢蔽空緩步齊驅僅三五里耳若四天春霽風和日暖無苦雨以齟齬其行顧雖賞心拾翠之徒亦得以盜傳經名矣是不亦濫哉惟霖雨作矣則泥淖深尺摳衣以趨者往往滅足没跗故無恭欽之心者將自怠無勇猛精進之心者將自息其有確然不改志在必傳者必能自度曰三藏若彼之勞且不迴顧我獨何者而變於風雨之偶然也是則因雨而去者但以傳經為名雖雨必傳者是皆至誠而不息者矣天使傳之者必至誠焉則此㑹所得不既多乎嗚呼不有疾風孰知勁草不有歲寒孰知松柏不有霖雨則傳經之人誠與不誠吾亦不得而知之也而今而後乃知是雨之作所以為修撰惠者深且巧矣故人以為淫雨而我以為法雨也於是衆議寂然無敢容其喙者且勉某記之某幸而知之矣敢以不才辭謹記一枝庵余少年喜水鑿井穴地泛溪釣月終日潺湲之樂蓋將安焉曰水止是矣或者曰是未嘗見江河淮濟也比年奔走道路偶皆見之汪洋萬頃茫無涯涘若風作其上則澎湃汗漫浪高銀屋然後知余前日之喜止牛蹄泓者耳或者又曰此亦未足以言水也是特四瀆之分耳若大海則㑹而納之六合内外通為一流豈啻萬川而巳哉余曰嘻有是哉余將遊焉客曰是烏能遍耶天地之大各五億五萬五千五百里而四海為之脈今欲登窮髪遊聶耳以極無窮之觀非肉飛八極不可也余乃茫然自失仰而嘆曰天下之景無窮而玩景之情亦無盡也任情逐景不知歸宿其將為波流乎嘗觀涓涓之微升於天行於地運乎千古曾無損益於此了之則當體而足滿空之水固無異於一滴耳亦何必滄海乎脱或不然而必欲賞之又有大於此者則將如之何哉嗚呼豈特觀水為然耶天下之事類皆如此夏屋廣殿金碧相照鳴鐘伐鼔食指數萬此釋氏之居也領其寺者指顧之間方袍雲集作止寢食無不可意其視安居老人䝉頭冷坐飲水采薇無曰相萬乎雖然不能安居而必欲領寺若以寺為未足則如之何世間輕煖肥甘迷樓瓊屋不知幾萬等吾又安能足其志耶嗚呼芬芬鼎烹要在滿腹沈沈府居要在駐足一庵之大固有餘地矣又何事他求哉莊周曰鷦鷯巢於深林不過一枝善乎莊周之能了此意也且不了一滴之旨雖傾四海之流不足以供其賞不悟一枝之要雖擴六合之大不足以厭其求此世士所以終身汨汨蕩蕩忘返可以深嗟而嘆息也妙智大師美公少年學醫法造三昧稍壯則事潛庵求西來意精進敏惠便為一時名僧若肯降志以悦當路則巨刹名寺當盡付之師乃恬然曾不介意是故求醫之人布施山積師盡捐之以作佛事嘗托迹太平寺適遭囘禄尺椽不具二十年間棟宇輪奐冠於一邑師之力蓋居其半事母最孝無愧古人忽失所恃則欲謝醫術曰吾不復事此既畢襄奉則作庵墓側為終焉計其視同參子麗服䧺居沛然得意但知如涕唾耳豈非了此一滴遂能安此一枝乎故余字其庵曰一枝庵客有問曰居庵之士當以億計豈皆了此乎余曰不然世人有才學智術不足以動人者退居茅舍蓋其分也幸而有學問語言粗可應對又平居交遊無顯人膴仕雖欲捨庵又將焉適此特繫焉而止耳豈皆悟此理耶其性識超然出人倫等士夫喜師不可勝計於此安之不有覬覦是眞了此者也雖然列子行天非風不可古人譏之蓋非無待而然者今師必賴一枝猶未脱焉百尺竿頭當進一步師肯承當否更俟他日與師分付師名仁美南劒州沙縣人也庵在縣之南起於宣和之季落成於靖康之初云栟櫚集巻十八
