body:
  text: 栟櫚集卷十三宋鄧肅撰文不校孟軻不與橫逆之人校曲直而與齊宣王論達尊韓愈不與高間文暢校夷夏而與憲宗論佛骨韓信不與淮陰少年校勝負而與項羽爭雄藺相如不與亷頗校上下而與秦王爭割地蓋不屑屑於其小者所以養成其大也揚雄不肯屈節於董賢而甘為王莽之臣柳宗元不肯下氣於皇甫湜而甘為王叔文之黨李忠臣赴君父之急能斥日者之言終不能拒朱泚之命卒以叛誅李陵能以匹馬力戰極邊終不能輒出一語上抗虜廷卒負其君為左衽之鬼蓋遇細故則竊虛名臨大節則顧死生此小人之事也大人何取焉古之所謂大人者體均天地而氣通陰陽天地覆載之中不却蛇虺陰陽寒暑之變不恤怨咨但推一元之氣運量斡旋於太空不可窮極之間乾闢坤藏春生秋殺又何必物物與之校可否乎若乃小人則一切反是余嘗譬之以狗飽食糞穢盤旋户外伺有至者不問淑慝瞋目碎牙聲氣俱厲將搏而噬之然後為快於心顧其性皆真若有守而不負其主者倘有客焉委骨於地彼則搖尾而進欣然就之視曩昔切齒之人便為恩地亦豈暇顧其主乎此大人小人之辨不可以不察也晉語有之人才相去不啻九牛毛蓋嘆其相絶如此顔子於此犯而不校蓋不與校也小子其志之祝詞惟金人息兵沙漠將大冦攘我方再造區夏弗克念帝乃拜臣左正言臣用夙夜栗栗危懼曰有宋宗社幾百有八十載今日存亡勿繫於百職事繫於冢宰暨二三議論之臣臣罔有舟楫克濟巨川謹拜手稽首告于皇天后土請自戒者三其一曰罔以國事用報我私德其二曰罔以國事用報我私怨其三曰罔以國事用資我富貴服食既盟之後二三其德以惑我后之聽臣當孥戮臣既單厥心而罔有嘉謀嘉猷可告於后惟天祐之嗚呼惟天聰明惟天念我太祖太宗之德勿忝堯舜文武惟天嗟我九州赤子切切願治若歲大旱徯霖雨惟天察彼戎狄憑陵中土熾于獫狁獯鬻天用牖臣俾事罔大小臣咸知入告于后后克從德政惟新天下悅服蠻夷冦賊弗干我邊陲萬民奠居邦其休哉庶幾臣小子亦克遄歸省厥母于北堂若臣小子弗克有濟惟天斥之俾投荒服速登俊良救民于水火毋俾小臣以蠧我家邦原直世人嘗謂窮達自天余以謂窮達自人非天也何則伯夷餓柳下惠黜孟軻不用於戰國之末韓愈不得安其身於朝廷之上比干剖心子胥抉眼真卿杲卿碎其身於賊手是為直必窮矣子貢得駟馬蘇秦得六印宇文士及得安其職張禹得全其身崔日用得學士宋之問得館職楊再思得宰相是則為佞者必達矣夫為直者必窮為佞者必達自古及今莫不皆然夫豈天哉雖然人生世上不過數十寒暑盛衰得失如蟻穴一夢耳於此枉道喪節以干妻孥之奉一時沛然自謂得志殊不知萬世之下使人聞其名而唾之僅與禽獸比若正直之士雖當時身不絲腹不粟斥竄流離真若可憐者然所謂浩然之氣歷千百年猶與日月爭光以此校彼孰久孰近故君子寧餓寧黜寧不用於世寧不得安其身於朝廷之上至於剖心抉眼碎於賊手亦寧任之惟直不可變耳余生蹤迹幾遍天下求其不以窮達生死少變其直者雖間有之要不可以多得也建炎初余謫歸沙邑有主簿虞君茂實諱某者相遇視其貌溫而謹聽其言真而信退竊自幸曰是必學者非止為科舉之士耳豫以得罪至重流落益久君又安於小官不能遽去忽忽相從且三年矣視君所為猶一日也與人無親疏貴賤一切以誠心待之聞人有善欣然若已有得及論朋友之過雖面顔發赤勿顧也其事官長亦不能少變辭色作寸進計顧雖齊庖索然殆不能煙青衫百結如霜後葉其自處如得志嗚呼君真坐直而窮者君真不以窮而變其直者此余所以願與交遊之末不敢以罪逐孤蹤自為君棄也孔子論三友以友直為最佛氏論四友以華友稱友為可鄙蓋華因時為盛衰稱視物為低昂此豈可與正直之友同日而語哉君今别余而東矣恐無規余失者余于是黯然作悲惜君之行也作原直弔墨跡文曾侯藏東坡墨跡十軸端友取其二歸而玩焉殆忘寢食時有同學之友見而駭之曰異時之文何可尚哉伺端友之出也於是焚之今十餘年矣端友此恨尚填胸臆栟櫚鄧肅志宏作文以弔焉其詞曰孟明之舟田單之牛楚王之象晉帝之裘施之於用無或不周一旦火之若不當惜蓋事有大於此者而又何足留哉先生之書顧其此儔一遇按劒回祿是投聞者奮起欲追無由此氣憤然徒吞九州嗟嗟先生凜凜高風道學卓然一世獨雄文中之虎人中之龍我筆無舌安能形容獨喜其書天下之極虞員歐方顔筋柳骨體雖紆餘精英不沒其或得之如藏白璧道既不行四海馳驅讐者疾之毅欲掃除書何預焉亦復焚如蓋怒之所移有及於水中之蟹而惡之已盛遂延㕑下之胥也嗚呼惜哉古人或屈于庭下以干訟牒或忍於斫棺以求遺法或見石鼓而長歌欲以隸諸生之業先生之書不減若人世間俗子乃爾毁滅豈書孟嘗之券馮歡持之以奔走豈書竺乾之文退之為之去取必精妙之至貫古無友直與六經相為先後李斯見之又將以愚黔首矣吾聞欒巴噀齊郭憲噀蜀劉崑降雨于江陵天使赦財于糜竺是皆奪之于煨燼之中而傳之與巳骨之肉先生之書獨不合焉吾知天使之未賢而三子亦碌碌焉者耳嗚呼書乎今何之乎紅焰烈烈其可追乎將歸於日月助其光明乎豈吐為長虹以攄其不平乎將激為飛電以神其威靈乎豈散為星斗以顯於天之文乎其煙氣蓬勃上徹青冥亦將化為卿雲以瑞天庭耶亦將感而為膏雨以澤生民耶亦念彼鄭衛之聲紛焉雜出將化為管中之灰以正其音律耶抑亦視彼狂瀾混混之中若滅若沒又從而哀之乃積為女媧之石以拯其陷溺者歟雖然是皆不足為先生道也先生之譽雖走風雷先生之心實若死灰心且灰矣書何有哉寶之聊耳焚之奚哀誡子一日之計在寅一年之計在春一身之計在少此陳了齊之言也木之就規矩在梓匠輪輿人之能為人由腹有詩書此韓昌黎之言也大丈夫不時時以古今澆沃胸中覽鏡則面目可憎對人則語言無味此黃山谷之言也余長子譜偶請余書余曰師節義於陳學古文於韓而習句法於黃當於妙年先味此三語勉之栟櫚集卷十三
